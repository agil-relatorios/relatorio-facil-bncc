<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - SISTEMA PEDAGÓGICO</title>
    <style>
        :root { 
            --primaria: #ff4757; --azul-ui: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; 
            --branco: #ffffff; --cor-vermelho: #e74c3c; --cor-amarelo: #f1c40f; --cor-azul: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        input, select { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; font-size: 0.9rem; }
        .upcase { text-transform: uppercase; }

        .secao-pergunta { background: #2f3542; color: white; padding: 10px; border-radius: 6px; margin: 20px 0 8px; }
        .pergunta-maior { display: block; font-size: 1rem; font-weight: 600; }
        
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-v { padding: 12px; border: 2px solid #edeff2; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; font-size: 0.75rem; background: white; transition: 0.3s; }
        .btn-v.ini.active { background: var(--cor-vermelho); color: white; border-color: var(--cor-vermelho); }
        .btn-v.pro.active { background: var(--cor-amarelo); color: white; border-color: var(--cor-amarelo); }
        .btn-v.ava.active { background: var(--cor-azul); color: white; border-color: var(--cor-azul); }

        .acoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-gerar { padding: 18px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; color: white; background: var(--primaria); cursor: pointer; }
        .btn-limpar { padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; background: white; }

        /* FORMATO A4 PARA IMPRESSÃO */
        #editor { 
            width: 210mm; min-height: 297mm; margin: 20px auto; background: white; 
            padding: 20mm; box-sizing: border-box; font-family: Arial, sans-serif; 
            font-size: 12pt; color: #000000; display: none; line-height: 1.5;
        }
        .corpo-texto { text-align: justify; text-indent: 1.25cm; margin-bottom: 1em; }
        .bloco-assinaturas { margin-top: 2cm; display: flex; flex-direction: column; align-items: center; }
        .assinaturas-superior { display: flex; justify-content: space-between; width: 100%; margin-bottom: 1.5cm; }
        .box-sig { border-top: 1px solid #000; width: 45%; text-align: center; padding-top: 5px; font-size: 10pt; font-weight: bold; }
        .box-sig-full { border-top: 1px solid #000; width: 60%; text-align: center; padding-top: 5px; font-size: 10pt; font-weight: bold; }

        @media print { 
            body { background: white; }
            .no-print { display: none !important; }
            #editor { display: block !important; margin: 0; border: none; width: 100%; } 
        }
    </style>
</head>
<body>

<header class="no-print">
    <h1 style="margin:0">CONTAÊ PROFE</h1>
    <small>Relatórios Técnicos e Afetivos</small>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" placeholder="Rio de Janeiro"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola" class="upcase"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof" class="upcase"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca" class="upcase"></div>
        <div class="campo"><label>Gênero</label>
            <select id="genero"><option>A CRIANÇA</option><option>O ALUNO</option><option>A ALUNA</option></select>
        </div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option value="1">1º BIMESTRE</option><option value="2">2º BIMESTRE</option>
                <option value="3">3º BIMESTRE</option><option value="4">4º BIMESTRE</option>
                <option value="S1">1º SEMESTRE</option><option value="S2">2º SEMESTRE</option>
            </select>
        </div>
    </div>

    <div id="campos-bncc"></div>

    <div class="acoes">
        <button class="btn-limpar" onclick="location.reload()">LIMPAR TUDO</button>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO</button>
    </div>
</div>

<div id="editor"></div>
<div class="no-print" style="text-align:center; padding: 20px; display:none" id="print-area">
    <button onclick="window.print()" style="padding:15px 40px; background:#2f3542; color:white; border-radius:8px; cursor:pointer">🖨️ CLIQUE PARA IMPRIMIR</button>
</div>

<script>
    const campos = [
        "1. O EU, O OUTRO E O NÓS (Interação e Regras)",
        "2. CORPO, GESTOS E MOVIMENTOS (Coordenação)",
        "3. TRAÇOS, SONS, CORES E FORMAS (Artes)",
        "4. ESCUTA, FALA, PENSAMENTO (Comunicação)",
        "5. ESPAÇO, TEMPO, RELAÇÕES (Raciocínio)"
    ];

    let escolhas = {};

    function montarInterface() {
        const container = document.getElementById('campos-bncc');
        campos.forEach((c, i) => {
            container.innerHTML += `
                <div class="secao-pergunta"><span class="pergunta-maior">${c}</span></div>
                <div class="grid-botoes" id="c-${i}">
                    <div class="btn-v ini" onclick="setCor(${i}, 'vermelho', this)">PRECISA DE MEDIAÇÃO</div>
                    <div class="btn-v pro" onclick="setCor(${i}, 'amarelo', this)">EM PROCESSO</div>
                    <div class="btn-v ava" onclick="setCor(${i}, 'azul', this)">COM AUTONOMIA</div>
                </div>`;
        });
    }

    function setCor(idx, cor, btn) {
        Array.from(document.getElementById(`c-${idx}`).children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        escolhas[idx] = cor;
    }

    function formatarCidade(str) {
        const excecoes = ["de", "da", "do", "dos", "das", "e"];
        return str.toLowerCase().split(' ').map((p, i) => {
            if (i > 0 && excecoes.includes(p)) return p;
            return p.charAt(0).toUpperCase() + p.slice(1);
        }).join(' ');
    }

    function sortear(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const database = {
        vermelho: {
            intro: [
                "Neste período, a prática docente focou na organização de uma rotina de acolhimento e cuidado, buscando oferecer segurança emocional à criança. Percebeu-se que ",
                "Através da mediação constante em momentos de grande grupo e atividades dirigidas, buscou-se pautar a ação pedagógica na escuta das necessidades individuais. Notou-se que "
            ],
            desenv: [
                "ainda necessita de suporte contínuo para realizar as rotinas de higiene e alimentação, apresentando resistência à aceitação de limites coletivos. Nas rodas de conversa, requer atenção individualizada para manter o foco, evidenciando que a construção de hábitos e o respeito aos combinados escolares estão em fase inicial de sensibilização. ",
                "demonstra forte dependência da mediação do professor para interagir com os pares e organizar seu comportamento na área externa. Apresenta dificuldades em lidar com frustrações, o que demanda um olhar afetuoso e firme da docente para auxiliar na regulação de suas emoções e na compreensão da rotina escolar. "
            ]
        },
        amarelo: {
            intro: [
                "Ao longo deste bimestre, estruturamos ambientes que provocam o protagonismo, respeitando as trajetórias individuais e os registros de vivência. Percebeu-se que ",
                "As propostas pedagógicas foram delineadas para encorajar a autonomia em pequenos grupos e momentos de área externa. Observou-se que "
            ],
            desenv: [
                "está em uma fase de transição positiva, começando a realizar as atividades dirigidas com menos intervenção direta, embora ainda busque a validação do adulto. Demonstra tentativas de resolver conflitos por meio do diálogo, demonstrando que os limites e a rotina estão sendo internalizados de forma gradual. ",
                "tem se mostrado mais participativo(a) nas festividades e encontros de grupo, ensaiando passos de autonomia na hora da história e atividades livres. Já consegue seguir a sequência da rotina com lembretes pontuais, revelando um amadurecimento consistente em sua postura social. "
            ]
        },
        azul: {
            intro: [
                "Pautamos nossa ação educativa na oferta de contextos desafiadores que instigam o desejo de conhecer e a resolução colaborativa. Notou-se que ",
                "Neste estágio, os direitos de conviver, brincar e participar foram exercidos com plenitude, garantindo excelência no desenvolvimento. Percebeu-se que "
            ],
            desenv: [
                "manifesta total autonomia e segurança ao circular pelos diferentes espaços e momentos da rotina. Interage com os pares de forma empática e lidera iniciativas em pequenos grupos, demonstrando domínio das normas de convívio e um protagonismo admirável em suas produções autorais. ",
                "apresenta uma postura investigativa e independente, realizando as atividades de cuidado e as propostas dirigidas com excelência. Sua fala é estruturada e demonstra clareza ao expressar desejos e mediar conflitos entre colegas, sendo um exemplo de autonomia no grupo. "
            ]
        }
    };

    function gerarRelatorio() {
        const nome = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const prof = document.getElementById('prof').value.toUpperCase();
        const esc = document.getElementById('escola').value.toUpperCase();
        const cidadeInput = document.getElementById('cidade').value || "Manaus";
        const cidade = formatarCidade(cidadeInput);
        const data = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

        // Cálculo da "cor dominante" do relatório
        const totais = { vermelho: 0, amarelo: 0, azul: 0 };
        Object.values(escolhas).forEach(v => totais[v]++);
        let dominante = "amarelo";
        if (totais.vermelho >= 3) dominante = "vermelho";
        else if (totais.azul >= 3) dominante = "azul";

        const intro = sortear(database[dominante].intro);
        const desenv = sortear(database[dominante].desenv);

        document.getElementById('editor').innerHTML = `
            <div style="text-align:center; font-weight:bold; margin-bottom:1cm;">${esc || 'NOME DA INSTITUIÇÃO'}</div>
            <div style="border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 1cm; text-transform:uppercase; font-size:11pt">
                DOCENTE: ${prof}<br>
                CRIANÇA: <b>${nome}</b><br>
                PERÍODO: ${document.querySelector('#periodo option:checked').text}
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:1cm;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL</div>
            <div class="corpo-texto">${intro} ${nome} ${desenv}</div>
            <div class="corpo-texto">Em relação aos campos de experiências, observa-se um progresso que respeita o tempo singular de maturação, sendo mediado por estratégias lúdicas que visam a garantia dos direitos de aprendizagem.</div>
            <div class="corpo-texto" style="margin-bottom:0">Concluímos este registro reafirmando o compromisso com uma educação de excelência, onde o cuidar e o educar caminham juntos para o pleno florescimento do estudante.</div>
            <div style="text-align:center; font-style:italic; margin: 1cm 0; font-size:11pt;">"Cada descoberta é um passo em direção ao futuro."</div>
            <div style="text-align:center; margin-bottom:1.5cm;">${cidade}, ${data}.</div>
            
            <div class="bloco-assinaturas">
                <div class="assinaturas-superior">
                    <div class="box-sig">PROFESSOR(A)</div>
                    <div class="box-sig">COORDENAÇÃO / DIREÇÃO</div>
                </div>
                <div class="box-sig-full">ASSINATURA DO RESPONSÁVEL</div>
            </div>
        `;

        document.getElementById('editor').style.display = 'block';
        document.getElementById('print-area').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    montarInterface();
</script>
</body>
</html>
