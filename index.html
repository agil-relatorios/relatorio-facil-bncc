<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Gerador Inteligente</title>
    <style>
        :root {
            --primaria: #ff4757; --secundaria: #2ed573; --terciaria: #1e90ff;
            --alerta: #ffa502; --bg: #f1f2f6; --texto: #2f3542; --branco: #ffffff;
            --avancado: #1e90ff; --processo: #2ed573; --inicial: #ffa502;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--branco); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primaria); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primaria); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; }
        .slogan { font-style: italic; color: #747d8c; margin-top: 5px; font-size: 0.95rem; }
        .nav-top { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-top { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #dfe4ea; transition: 0.3s; }
        .btn-top:hover { background: #ced4da; }
        .btn-limpar { background: #ff7675; color: white; }
        
        /* Grid de Entradas */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .campo { display: flex; flex-direction: column; }
        .campo label { font-weight: bold; font-size: 0.8rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 1rem; text-transform: uppercase; outline: none; }
        input:focus { border-color: var(--primaria); }

        .secao-titulo { background: var(--texto); color: white; padding: 10px 15px; border-radius: 8px; margin: 30px 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        
        /* Grid de Cards BNCC */
        .palavras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .btn-palavra { 
            padding: 10px; border: 1px solid #eee; border-radius: 8px; background: #fff; 
            cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; text-transform: uppercase;
        }
        .btn-palavra.avancado.selected { background-color: var(--avancado) !important; color: white; }
        .btn-palavra.processo.selected { background-color: var(--processo) !important; color: white; }
        .btn-palavra.inicial.selected { background-color: var(--inicial) !important; color: white; }

        .btn-gerar { width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; margin-top: 15px; transition: 0.3s; background: var(--primaria); }
