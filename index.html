<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo_contae.png">
    <link rel="apple-touch-icon" href="logo_contae.png">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background-color: #ff4d4d; color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 10px 0 0; font-size: 14px; font-style: italic; line-height: 1.4; }
        
        #installBtn { display: none; background: #28a745; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; cursor: pointer; font-weight: bold; border: none; width: 100%; font-size: 14px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; font-size: 13px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; font-size: 16px; }
        
        .btn-generate { background-color: #ff4d4d; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 25px; font-size: 16px; }
        
        #relatorioArea { display: none; margin-top: 30px; padding: 20px; border: 2px solid #ff4d4d; background: #fff; border-radius: 10px; }
        .rel-text { line-height: 1.8; text-align: justify; color: #333; margin-top: 20px; }
        .print-btn { background: #28a745; color: white; margin-top: 20px; width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button id="installBtn">📲 CLIQUE AQUI PARA BAIXAR O APP</button>

    <div class="header">
        <h1>CONTAÊ <span style="color: #ffeb3b;">PROFE</span></h1>
        <p>"A voz do professor, a história da criança, transformando vivências em registros."</p>
    </div>

    <label>NOME DA INSTITUIÇÃO</label>
    <input type="text" id="escola" placeholder="Ex: CMEI Julia Barjona">

    <label>PROFESSOR(A)</label>
    <input type="text" id="professor" placeholder="Seu nome completo">

    <label>CRIANÇA</label>
    <input type="text" id="crianca" placeholder="Nome do aluno">

    <label>GÊNERO</label>
    <select id="genero">
        <option value="o aluno">O ALUNO</option>
        <option value="a aluna">A ALUNA</option>
        <option value="a criança">A CRIANÇA</option>
    </select>

    <button class="btn-generate" onclick="gerarRelatorio()">📄 GERAR RELATÓRIO</button>

    <div id="relatorioArea">
        <div id="conteudoRelatorio" class="rel-text"></div>
        <button class="print-btn" onclick="window.print()">SALVAR OU ENVIAR</button>
    </div>
</div>

<script>
    // Lógica de Instalação
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    });

    function gerarRelatorio() {
        const crianca = document.getElementById('crianca').value.toUpperCase();
        const escola = document.getElementById('escola').value;
        const prof = document.getElementById('professor').value;
        const genero = document.getElementById('genero').value;
        
        const data = new Date().toLocaleDateString('pt-BR');

        const texto = `<strong>RELATÓRIO DE DESENVOLVIMENTO PEDAGÓGICO</strong><br><br>
        Durante este período, as vivências pedagógicas de <strong>${crianca}</strong> no ${escola} foram fundamentadas nos direitos de aprendizagem da BNCC. Seu desenvolvimento foi observado atentamente pelo(a) professor(a) ${prof}.<br><br>
        Nota-se que ${crianca} apresenta um processo de amadurecimento constante. No que se refere à linguagem e socialização, ${genero} demonstra segurança ao enfrentar novos desafios e participar das propostas pedagógicas.<br><br>
        Manaus, ${data}.`;

        document.getElementById('conteudoRelatorio').innerHTML = texto;
        document.getElementById('relatorioArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
