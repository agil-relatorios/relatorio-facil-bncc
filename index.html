<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre - Relatório Inteligente</title>
    <style>
        @media print { .no-print { display: none; } body { background: white; padding: 0; } .container { box-shadow: none; border: none; width: 100%; max-width: 100%; } }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fdfcf0; color: #444; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: auto; border: 1px solid #eef2f3; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #ffcb05; padding-bottom: 10px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #2c3e50; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background-color: #27ae60; color: white; grid-column: span 2; font-size: 16px; margin-top: 10px; }
        .btn-copy { background-color: #2980b9; color: white; }
        .btn-save { background-color: #8e44ad; color: white; }
        .btn-print { background-color: #34495e; color: white; grid-column: span 2; }
        .btn-manual { background-color: #f39c12; color: white; width: 100%; margin-bottom: 15px; }
        #saida { margin-top: 25px; padding: 25px; border: 2px dashed #ffcb05; background: #fffcf2; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <button class="btn-manual" onclick="alert('Guia Rápido:\n1. Digite o nome.\n2. Escolha os campos.\n3. O App gera um texto único para cada clique!\n4. Copie ou salve.')">📖 Manual de Uso</button>
        <h1>EducaNobre 🍎</h1>
        <p class="subtitle">Relatórios Exclusivos por Aluno (BNCC)</p>

        <label>Nome do Pequeno(a):</label>
        <input type="text" id="nomeAluno" placeholder="Nome completo do aluno">

        <label>Campo de Experiência:</label>
        <select id="campo">
            <option value="Corpo, gestos e movimentos">Corpo, gestos e movimentos</option>
            <option value="O eu, o outro e o nós">O eu, o outro e o nós</option>
            <option value="Traços, sons, cores e formas">Traços, sons, cores e formas</option>
            <option value="Escuta, fala, pensamento e imaginação">Escuta, fala, pensamento e imaginação</option>
            <option value="Espaços, tempos, quantidades, relações e transformações">Espaços, tempos, quantidades</option>
        </select>

        <label>Momento do Desenvolvimento:</label>
        <select id="nivel">
            <option value="avancado">Desenvolve-se com autonomia</option>
            <option value="intermediario">Em fase de conquistas</option>
            <option value="inicial">Iniciando com apoio</option>
        </select>

        <button class="btn-main" onclick="gerarRelatorio()">Gerar Texto Exclusivo</button>
    </div>

    <div id="saida">
        <div id="corpoTexto" style="white-space: pre-wrap; font-size: 16px;"></div>
        <div class="btn-group no-print">
            <button class="btn-copy" onclick="copiarTexto()">Copiar</button>
            <button class="btn-save" onclick="baixarArquivo()">Salvar .txt</button>
            <button class="btn-print" onclick="window.print()">Imprimir/PDF</button>
        </div>
    </div>
</div>

<script>
    function gerarRelatorio() {
        const nome = document.getElementById('nomeAluno').value || "A criança";
        const campo = document.getElementById('campo').value;
        const nivel = document.getElementById('nivel').value;

        // BANCO DE FRASES VARIADAS (O "Cérebro" do sorteio)
        const frases = {
            "Corpo, gestos e movimentos": {
                "avancado": [
                    `${nome} demonstra um excelente domínio motor, participando com entusiasmo de desafios físicos e brincadeiras que exigem equilíbrio.`,
                    `${nome} revela grande segurança em seus movimentos, explorando o espaço escolar com agilidade e harmonia corporal.`,
                    `${nome} manifesta consciência corporal plena, coordenando seus movimentos com precisão em atividades lúdicas e circuitos.`
                ],
                "intermediario": [
                    `${nome} está em uma fase produtiva de conquistas motoras, demonstrando interesse em superar novos desafios físicos diariamente.`,
                    `Observamos que ${nome} busca participar ativamente de propostas de movimento, ganhando gradualmente maior firmeza e equilíbrio.`,
                    `${nome} demonstra curiosidade ao explorar circuitos físicos, aprimorando sua coordenação motora com persistência.`
                ],
                "inicial": [
                    `${nome} está iniciando a exploração de suas possibilidades motoras, recebendo estímulos carinhosos para ganhar confiança em seus movimentos.`,
                    `Com apoio e mediação, ${nome} tem descoberto novas formas de se equilibrar e interagir com o espaço ao seu redor.`,
                    `Estamos acompanhando as primeiras grandes conquistas motoras de ${nome}, que demonstra interesse em tentar novos desafios físicos com auxílio.`
                ]
            }
        };

        // Função para sortear uma frase do banco
        const selecionarFrase = (campo, nivel) => {
            if (frases[campo]) {
                const opcoes = frases[campo][nivel];
                return opcoes[Math.floor(Math.random() * opcoes.length)];
            }
            return `${nome} demonstra evolução nas propostas de ${campo}, participando das vivências propostas com interesse.`;
        };

        const textoFinal = `RELATÓRIO DE DESENVOLVIMENTO\n\nALUNO(A): ${nome}\nCAMPO: ${campo}\n\nDESCRIÇÃO: ${selecionarFrase(campo, nivel)}\n\nGerado em: ${new Date().toLocaleDateString('pt-BR')}`;

        document.getElementById('corpoTexto').innerText = textoFinal;
        document.getElementById('saida').style.display = 'block';
    }

    function copiarTexto() {
        navigator.clipboard.writeText(document.getElementById('corpoTexto').innerText);
        alert("Texto copiado!");
    }

    function baixarArquivo() {
        const blob = new Blob([document.getElementById('corpoTexto').innerText], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Relatorio_${document.getElementById('nomeAluno').value || 'aluno'}.txt`;
        link.click();
    }
</script>
</body>
</html>
