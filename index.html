<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background-color: #ff4d4d; color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        
        /* Botão de Instalação Estilo Acesso Seguro */
        #installBtn { display: none; background: #28a745; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; cursor: pointer; font-weight: bold; border: none; width: 100%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 12px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Estilo BNCC (Os botões que você gosta) */
        .bncc-section { background: #007bff; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        .options-row { display: flex; gap: 5px; margin-top: 10px; }
        .opt-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; font-size: 12px; font-weight: bold; color: #666; }
        .opt-btn.active { background: #ffc107; color: #000; border-color: #ffc107; }

        .btn-generate { background-color: #ff4d4d; color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 30px; font-size: 16px; }
        
        #relatorioArea { display: none; margin-top: 30px; padding: 30px; border: 2px solid #ff4d4d; border-radius: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <button id="installBtn">📲 CLIQUE AQUI PARA INSTALAR O APP NA TELA</button>

    <div class="header">
        <h1>CONTAÊ <span style="color: #ffeb3b;">PROFE</span></h1>
        <p>"A voz do professor, a história da criança, transformando vivências em registros."</p>
    </div>

    <div class="grid-inputs">
        <div><label>INSTITUIÇÃO</label><input type="text" id="escola"></div>
        <div><label>PROFESSOR(A)</label><input type="text" id="professor"></div>
        <div><label>CRIANÇA</label><input type="text" id="crianca"></div>
        <div><label>GÊNERO</label>
            <select id="genero">
                <option value="o aluno">O ALUNO</option>
                <option value="a aluna">A ALUNA</option>
            </select>
        </div>
    </div>

    <div class="bncc-section">1. O EU, O OUTRO E O NÓS<br><small>Vínculos e identidade</small></div>
    <div class="options-row">
        <button class="opt-btn" onclick="selectOpt(this, 'bncc1')">INICIAL</button>
        <button class="opt-btn active" onclick="selectOpt(this, 'bncc1')">PROCESSO</button>
        <button class="opt-btn" onclick="selectOpt(this, 'bncc1')">AVANÇADO</button>
    </div>

    <div class="bncc-section">2. CORPO, GESTOS E MOVIMENTOS<br><small>Autonomia motora</small></div>
    <div class="options-row">
        <button class="opt-btn" onclick="selectOpt(this, 'bncc2')">INICIAL</button>
        <button class="opt-btn active" onclick="selectOpt(this, 'bncc2')">PROCESSO</button>
        <button class="opt-btn" onclick="selectOpt(this, 'bncc2')">AVANÇADO</button>
    </div>

    <button class="btn-generate" onclick="gerarRelatorio()">📄 GERAR RELATÓRIO COMPLETO</button>

    <div id="relatorioArea">
        <div id="conteudoRelatorio"></div>
        <button onclick="window.print()" style="background:#28a745; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:20px; font-weight:bold;">SALVAR EM PDF / ENVIAR</button>
    </div>
</div>

<script>
    function selectOpt(btn, group) {
        const row = btn.parentElement;
        row.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function gerarRelatorio() {
        const crianca = document.getElementById('crianca').value.toUpperCase();
        const genero = document.getElementById('genero').value;
        const escola = document.getElementById('escola').value;
        
        let texto = `<strong>RELATÓRIO PEDAGÓGICO - ${escola}</strong><br><br>`;
        texto += `Observamos que ${genero} <strong>${crianca}</strong>, durante este período, desenvolveu suas competências baseadas na BNCC...`;
        
        document.getElementById('conteudoRelatorio').innerHTML = texto;
        document.getElementById('relatorioArea').style.display = 'block';
        document.getElementById('relatorioArea').scrollIntoView({ behavior: 'smooth' });
    }

    // Lógica de instalação
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
