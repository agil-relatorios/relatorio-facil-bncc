<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Narrativas de Afeto</title>
    <style>
        :root {
            --primaria: #ff4757; --secundaria: #2ed573; --terciaria: #1e90ff;
            --alerta: #ffa502; --bg: #f1f2f6; --texto: #2f3542; --branco: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primaria); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primaria); font-size: 2.2rem; text-transform: uppercase; }
        .slogan { font-style: italic; color: #747d8c; margin-top: 8px; font-size: 1rem; line-height: 1.4; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.8rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 1rem; text-transform: uppercase; outline: none; background: white; }

        .secao-titulo { background: #2f3542; color: white; padding: 12px; border-radius: 8px; margin: 25px 0 10px; font-weight: bold; font-size: 0.9rem; }
        .grid-palavras { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
        .btn-check { padding: 10px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; text-align: center; }
        
        .btn-check.avancado.active { background: var(--terciaria); color: white; border-color: var(--terciaria); }
        .btn-check.processo.active { background: var(--secundaria); color: white; border-color: var(--secundaria); }
        .btn-check.inicial.active { background: var(--alerta); color: white; border-color: var(--alerta); }

        .btn-gerar { width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; margin-top: 30px; background: var(--primaria); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }
        
        #resultado-secao { display: none; margin-top: 40px; }
        
        #editor { 
            width: 210mm; 
            min-height: 297mm; 
            padding: 25mm 20mm; 
            margin: auto;
            font-family: Arial, sans-serif; 
            font-size: 12pt; 
            line-height: 1.6; 
            text-align: justify; 
            background: white; 
            outline: none; 
            box-sizing: border-box;
            border: 1px solid #ddd;
        }
        
        @media print { 
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; } 
            .container { box-shadow: none; border: none; width: 100%; max-width: none; padding: 0; margin: 0; }
            #editor { border: none; padding: 20mm 15mm; width: 100%; min-height: auto; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <h1>CONTAÊ PROFE</h1>
        <p class="slogan">“A voz do professor, a história da criança. Transformando observação pedagógica em narrativas de afeto.”</p>
    </div>

    <div class="grid-inputs">
        <div class="campo"><label>Nome da Criança</label><input type="text" id="nome_crianca" placeholder="NOME COMPLETO"></div>
        <div class="campo"><label>Escola</label><input type="text" id="nome_escola" placeholder="NOME DA INSTITUIÇÃO"></div>
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" placeholder="EX: RIO DE JANEIRO"></div>
        <div class="campo">
            <label>Etapa / Semestre</label>
            <select id="semestre_select">
                <option value="PRÉ-ESCOLA - 1º SEMESTRE">PRÉ-ESCOLA - 1º SEMESTRE</option>
                <option value="PRÉ-ESCOLA - 2º SEMESTRE">PRÉ-ESCOLA - 2º SEMESTRE</option>
            </select>
        </div>
    </div>

    <div class="secao-titulo">PERFIL SOCIOEMOCIONAL (1 a 7 opções)</div>
    <div id="grid-perfil" class="grid-palavras"></div>

    <div id="secoes-bncc"></div>

    <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO PADRÃO A4</button>
</div>

<div id="resultado-secao">
    <div id="editor" contenteditable="true"></div>
    <div class="no-print" style="max-width:210mm; margin: 20px auto; display: flex; gap:10px;">
        <button onclick="window.print()" style="flex:1; padding:15px; background:var(--terciaria); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR / PDF</button>
        <button onclick="location.reload()" style="padding:15px; background:#666; color:white; border:none; border-radius:10px; cursor:pointer;">🧹 NOVO</button>
    </div>
</div>

<script>
    const db = {
        perfil: {
            avancado: ['Calma', 'Prestativa', 'Estudiosa', 'Autônoma', 'Criativa', 'Comunicativa'],
            processo: ['Observadora', 'Participativa', 'Curiosa', 'Cautelosa', 'Espontânea'],
            inicial: ['Reservada', 'Insegura', 'Impulsiva', 'Dependente', 'Resistente']
        },
        campos: [
            { titulo: "1. O Eu, o Outro e o Nós", av: ['Lidera', 'Colabora', 'Empatiza', 'Resolve'], int: ['Interage', 'Integra-se', 'Solicita', 'Participa'], ini: ['Isola-se', 'Necessita', 'Recusa', 'Reage'] },
            { titulo: "2. Corpo, Gestos e Movimentos", av: ['Domina', 'Coordena', 'Equilibra', 'Orienta-se'], int: ['Desenvolve', 'Experimenta', 'Aprimora', 'Segue'], ini: ['Tateia', 'Limita-se', 'Requer estímulo', 'Observa'] },
            { titulo: "3. Traços, Sons, Cores e Formas", av: ['Cria', 'Inova', 'Detalha', 'Interpreta'], int: ['Explora', 'Identifica', 'Manuseia', 'Reconhece'], ini: ['Rabisca', 'Amassa', 'Toca', 'Acompanha'] },
            { titulo: "4. Escuta, Fala, Pensamento e Imaginação", av: ['Argumenta', 'Narra', 'Questiona', 'Relata'], int: ['Nomeia', 'Expressa', 'Repete', 'Pergunta'], ini: ['Aponta', 'Ouve', 'Imita', 'Silencia'] },
            { titulo: "5. Espaço, Tempo, Quantidades e Relações", av: ['Compara', 'Classifica', 'Estima', 'Quantifica'], int: ['Agrupa', 'Ordena', 'Percebe', 'Manipula'], ini: ['Olha', 'Empilha', 'Derruba', 'Sente'] }
        ]
    };

    const selecoes = { perfil: [], bncc: {} };

    function formatarNomeProprio(texto) {
        const excecoes = ['de', 'da', 'do', 'dos', 'das', 'e'];
        return texto.toLowerCase().split(' ').map((palavra, index) => {
            if (palavra === "") return "";
            if (excecoes.includes(palavra) && index !== 0) return palavra;
            return palavra.charAt(0).toUpperCase() + palavra.slice(1);
        }).join(' ');
    }

    function iniciar() {
        const gridP = document.getElementById('grid-perfil');
        Object.keys(db.perfil).forEach(nivel => {
            db.perfil[nivel].forEach(palavra => {
                const btn = document.createElement('button');
                btn.className = `btn-check ${nivel}`;
                btn.innerText = palavra;
                btn.onclick = () => {
                    if (btn.classList.contains('active')) { btn.classList.remove('active'); selecoes.perfil = selecoes.perfil.filter(p => p !== palavra); }
                    else if (selecoes.perfil.length < 7) { btn.classList.add('active'); selecoes.perfil.push(palavra); }
                };
                gridP.appendChild(btn);
            });
        });

        const containerBNCC = document.getElementById('secoes-bncc');
        db.campos.forEach((campo, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `<div class="secao-titulo">${campo.titulo}</div><div class="grid-palavras" id="campo-${idx}"></div>`;
            containerBNCC.appendChild(div);
            const grid = document.getElementById(`campo-${idx}`);
            selecoes.bncc[idx] = [];
            ['av', 'int', 'ini'].forEach(n => {
                campo[n].forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = `btn-check ${n === 'av' ? 'avancado' : n === 'int' ? 'processo' : 'inicial'}`;
                    btn.innerText = p;
                    btn.onclick = () => {
                        if (btn.classList.contains('active')) { btn.classList.remove('active'); selecoes.bncc[idx] = selecoes.bncc[idx].filter(x => x !== p); }
                        else if (selecoes.bncc[idx].length < 4) { btn.classList.add('active'); selecoes.bncc[idx].push(p); }
                    };
                    grid.appendChild(btn);
                });
            });
        });
    }

    function gerarRelatorio() {
        const nomeBruto = document.getElementById('nome_crianca').value || "A CRIANÇA";
        const escolaBruta = document.getElementById('nome_escola').value || "INSTITUIÇÃO DE ENSINO";
        const cidadeBruta = document.getElementById('cidade').value || "________________";
        const semestre = document.getElementById('semestre_select').value;

        const nome = formatarNomeProprio(nomeBruto);
        const escola = formatarNomeProprio(escolaBruta);
        const cidade = formatarNomeProprio(cidadeBruta);
        
        const pNome = nome.split(' ')[0];
        const dataH = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });

        let texto = `<div style="text-align:center; font-weight:bold; font-size:14pt; margin-bottom:5px;">EDUCAÇÃO INFANTIL - PARECER INDIVIDUAL</div>`;
        texto += `<div style="text-align:center; font-weight:bold; font-size:12pt; margin-bottom:25px; color:#555;">${semestre}</div>`;
        
        texto += `<p style="text-indent: 1.5cm;">Durante este período letivo, as vivências de <b>${nome}</b> na instituição <b>${escola}</b> foram fundamentadas nos objetivos de aprendizagem da BNCC. A criança demonstrou um percurso de desenvolvimento singular, participando ativamente das propostas pedagógicas.</p>`;

        if(selecoes.perfil.length > 0) {
            texto += `<p style="text-indent: 1.5cm;">Em seu aspecto socioemocional, ${pNome} revela-se uma criança <b>${selecoes.perfil.join(', ').toLowerCase()}</b>. No convívio social, interage com segurança, demonstrando empatia e prontidão em colaborar com os pares e professores.</p>`;
        }

        const conectores = [
            "No campo das relações interpessoais, ",
            "Quanto ao domínio do corpo e movimentos, ",
            "Em relação à exploração de traços e formas, ",
            "Sobre a comunicação e expressividade, ",
            "No que tange às noções de tempo e espaço, "
        ];

        db.campos.forEach((c, i) => {
            if(selecoes.bncc[i].length > 0) {
                texto += `<p style="text-indent: 1.5cm;">${conectores[i]} observa-se que a criança ${selecoes.bncc[i].join(', ').toLowerCase()} com autonomia e protagonismo.</p>`;
            }
        });

        texto += `<p style="text-indent: 1.5cm;">Concluímos que ${pNome} segue em pleno desenvolvimento cognitivo e afetivo, integrando-se plenamente ao grupo.</p>`;
        
        texto += `<br><div style="text-align:right;">${cidade}, ${dataH}.</div>`;

        texto += `<table style="width:100%; border:none; text-align:center; font-size:10pt; margin-top:80px;">
            <tr>
                <td style="width:30%; border-top: 1px solid black; padding-top:5px;">GESTOR(A) / COORDENAÇÃO</td>
                <td style="width:5%;"></td>
                <td style="width:30%; border-top: 1px solid black; padding-top:5px;">PROFESSOR(A) REGENTE</td>
                <td style="width:5%;"></td>
                <td style="width:30%; border-top: 1px solid black; padding-top:5px;">PAIS / RESPONSÁVEL</td>
            </tr>
        </table>`;

        document.getElementById('editor').innerHTML = texto;
        document.getElementById('resultado-secao').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
    window.onload = iniciar;
</script>
</body>
</html>
