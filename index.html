<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Excelência ABNT</title>
    <style>
        /* Estilos da Interface (Não afetam a impressão) */
        :root { --primaria: #2f3542; --azul: #1e90ff; --bg: #f1f2f6; --branco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: var(--branco); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 3px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-transform: uppercase; }
        .secao-titulo-app { background: var(--primaria); color: white; padding: 8px; border-radius: 5px; margin: 15px 0 8px; font-weight: bold; font-size: 0.8rem; }
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-v { padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 0.7rem; text-align: center; font-weight: bold; }
        .btn-v.active { background: #2f3542; color: white; }
        .btn-gerar { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; margin-top: 20px; background: #27ae60; }

        /* CONFIGURAÇÃO DE EXCELÊNCIA PARA IMPRESSÃO */
        #editor { 
            width: 210mm; 
            height: 297mm; 
            margin: 30px auto; 
            background: white; 
            box-sizing: border-box; 
            padding: 30mm 20mm 20mm 30mm; /* Margens padrão: Sup/Esq 3cm, Inf/Dir 2cm */
            font-family: "Arial", "Times New Roman", serif; 
            font-size: 12pt; 
            line-height: 1.5; 
            color: #000000; 
            text-align: justify; 
            display: none; 
            overflow: hidden;
            border: 1px solid #ddd;
        }
        
        .cabecalho { text-align: center; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .dados-doc { border-bottom: 1.5pt solid #000; padding-bottom: 10px; margin-bottom: 1.5em; font-size: 12pt; line-height: 1.5; }
        
        /* Espaçamento 1,5 antes e depois do título */
        .titulo-relatorio { 
            text-align: center; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 1.5em; 
            margin-bottom: 1.5em; 
            font-size: 12pt; 
        }

        .texto-corpo { margin-bottom: 1.5em; text-indent: 1.25cm; }

        .assinaturas-lista { margin-top: 3em; width: 100%; }
        .item-assinatura { margin-bottom: 2em; width: 100%; text-align: center; }
        .linha-assinatura-vazia { border-top: 1pt solid #000; width: 80%; margin: 0 auto 5px auto; }
        .linha-assinatura-texto { font-weight: bold; text-transform: uppercase; font-size: 12pt; }

        @page { size: A4; margin: 0; }
        @media print { 
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; } 
            #editor { display: block !important; border: none !important; margin: 0 !important; } 
        }
    </style></head><body>

<div class="container no-print">
    <h2 style="text-align:center">Painel Pedagógico - Excelência</h2>
    <div class="grid-inputs">
        <div class="campo"><label>Escola</label><input type="text" id="escola"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Turma</label><input type="text" id="turma"></div>
        <div class="campo"><label>Período</label><select id="periodo"><option>1º SEMESTRE</option><option>2º SEMESTRE</option></select></div>
    </div>

    <div id="campos-container"></div>
    <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR DOCUMENTO FINAL (12pt)</button>
</div>

<div id="editor" contenteditable="true"></div>

<div class="no-print" id="btn-print" style="display:none; text-align:center; margin: 20px 0 100px;">
    <button onclick="window.print()" style="padding:15px 50px; background:#2f3542; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR RELATÓRIO</button>
</div>

<script>
    const frasesIA = { campos: [
        {ini:["revela estar em fase de sensibilização quanto às normas de convivência.","demonstra observar as interações sociais com cautela."], pro:["apresenta autonomia crescente em suas escolhas sociais.","colabora com os pares e expressa seus sentimentos."], ava:["protagoniza ações de liderança e empatia no grupo.","demonstra segurança plena em sua identidade."]},
        {ini:["explora as possibilidades motoras com cuidado e atenção.","tateia novos movimentos corporais progressivamente."], pro:["coordena os movimentos com harmonia nas propostas.","revela controle progressivo da motricidade."], ava:["domina com agilidade a consciência corporal.","expressa-se corporalmente com criatividade."]},
        {ini:["tateia linguagens artísticas com curiosidade sensorial.","explora sons e ritmos com o próprio corpo."], pro:["expressa criatividade utilizando diversos suportes.","participa de momentos musicais com entusiasmo."], ava:["manifesta uma identidade artística singular.","domina o uso de diferentes ferramentas artísticas."]},
        {ini:["encontra-se em processo de ampliação do repertório oral.","demonstra interesse por narrativas literárias."], pro:["organiza o pensamento para narrar vivências.","dialoga com os colegas com clareza."], ava:["argumenta com segurança sobre diversos temas.","protagoniza momentos de contação de histórias."]},
        {ini:["explora noções de tempo e espaço com mediação.","observa relações de causa e efeito."], pro:["classifica objetos segundo critérios lógicos.","realiza contagens com autonomia em construção."], ava:["domina conceitos de seriação e contagem.","identifica com clareza a passagem do tempo."]}
    ]};

    const nomesCampos = ["1. O Eu, o Outro e o Nós","2. Corpo, Gestos e Movimentos","3. Traços, Sons, Cores e Formas","4. Escuta, Fala, Pensamento e Imaginação","5. Espaço, Tempo, Quantidades e Relações"];
    const selecoes = { campos: {} };

    function iniciar() {
        const cCont = document.getElementById('campos-container');
        nomesCampos.forEach((titulo, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `<div class="secao-titulo-app">${titulo}</div><div class="grid-botoes" id="c-${idx}"></div>`;
            cCont.appendChild(div);
            const grid = document.getElementById(`c-${idx}`);
            [{l:"INICIAL",n:"ini"},{l:"PROCESSO",n:"pro"},{l:"AVANÇADO",n:"ava"}].forEach(opt => {
                const btn = document.createElement('div'); btn.className = 'btn-v'; btn.innerText = opt.l;
                btn.onclick = () => { Array.from(grid.children).forEach(b => b.classList.remove('active')); btn.classList.add('active'); selecoes.campos[idx] = opt.n; };
                grid.appendChild(btn);
            });
        });
    }

    function gerarRelatorio() {
        const p = { 
            nome: document.getElementById('crianca').value.toUpperCase() || "NOME DO ALUNO", 
            escola: document.getElementById('escola').value.toUpperCase() || "NOME DA ESCOLA", 
            prof: document.getElementById('prof').value.toUpperCase() || "NOME DO PROFESSOR", 
            turma: document.getElementById('turma').value.toUpperCase() || "TURMA", 
            periodo: document.getElementById('periodo').value 
        };
        
        const con = [" No convívio social, ", " Quanto à motricidade, nota-se que ", " Na esfera da criatividade, o aluno ", " Já na comunicação e fala, ", " Por fim, no raciocínio lógico, "];
        let tCam = ""; 
        nomesCampos.forEach((_, i) => { if(selecoes.campos[i]) tCam += con[i] + frasesIA.campos[i][selecoes.campos[i]][0]; });

        document.getElementById('editor').innerHTML = `
            <div class="cabecalho">${p.escola}</div>
            <div class="dados-doc"><b>CRIANÇA:</b> ${p.nome}<br><b>TURMA:</b> ${p.turma} | <b>DOCENTE:</b> ${p.prof}</div>
            
            <div class="titulo-relatorio">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${p.periodo}</div>
            
            <div class="texto-corpo">
                O percurso pedagógico de ${p.nome} neste período foi marcado por vivências que nortearam o desenvolvimento integral, 
                apresentando participação ativa nas rotinas escolares.${tCam} As conquistas alcançadas refletem um caminhar de sucesso, 
                pautado no respeito e na ampliação de potencialidades individuais.
            </div>
            
            <div class="assinaturas-lista">
                <div class="item-assinatura"><div class="linha-assinatura-vazia"></div><div class="linha-assinatura-texto">Professor(a)</div></div>
                <div class="item-assinatura"><div class="linha-assinatura-vazia"></div><div class="linha-assinatura-texto">Coordenação Pedagógica</div></div>
                <div class="item-assinatura"><div class="linha-assinatura-vazia"></div><div class="linha-assinatura-texto">Pai / Mãe / Responsável</div></div>
            </div>`;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'block';
    }
    iniciar();
</script></body></html>
