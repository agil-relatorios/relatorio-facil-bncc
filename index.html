<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - A4 Única</title>
    <style>
        :root { --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .slogan { font-size: 0.8rem; font-style: italic; opacity: 0.9; }
        .container { max-width: 800px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .campo-input { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; color: #57606f; margin-bottom: 3px; }
        input, select { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; outline: none; text-transform: uppercase; font-size: 0.8rem; }
        .secao-pergunta { background: var(--azul); color: white; padding: 10px; border-radius: 8px; margin: 15px 0 5px; }
        .titulo-campo { font-size: 1.1rem; font-weight: bold; display: block; }
        .guia-professor { font-size: 0.8rem; opacity: 0.9; }
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-v { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; background: white; font-size: 0.7rem; }
        .btn-v.active { color: white; border-color: transparent; }
        .btn-v.ini.active { background: #e74c3c; }
        .btn-v.pro.active { background: #f1c40f; }
        .btn-v.ava.active { background: #2ecc71; }
        .btn-gerar { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; background: var(--primaria); margin-top: 20px; }

        /* CONFIGURAÇÃO PARA CABER EM 1 FOLHA A4 */
        @media print {
            @page { size: A4; margin: 1.5cm 1.5cm 1cm 2cm; }
            .no-print { display: none !important; }
            body { background: white !important; padding: 0; }
            #editor { 
                display: block !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                border: none !important;
                font-family: Arial, sans-serif !important;
                font-size: 11pt !important; /* Diminuído levemente para caber */
                color: #000 !important;
            }
            .paragrafo { text-indent: 1.25cm; text-align: justify; margin-bottom: 8px; line-height: 1.4; }
        }

        #editor { 
            width: 210mm; margin: 20px auto; background: white; display: none; 
            padding: 2cm; box-sizing: border-box; border: 1px dashed #ccc; 
            text-align: justify; line-height: 1.4; color: #000;
        }
    </style>
</head>
<body>
    <header class="no-print">
        <h1 class="logo">CONTAÊ PROFE</h1>
        <div class="slogan">"A voz do professor, a história da criança..."</div>
    </header>

    <div class="container no-print">
        <div class="grid-inputs">
            <div class="campo-input"><label>Escola</label><input type="text" id="escola"></div>
            <div class="campo-input"><label>Professor</label><input type="text" id="prof"></div>
            <div class="campo-input"><label>Criança</label><input type="text" id="crianca"></div>
            <div class="campo-input"><label>Turma</label><input type="text" id="turma" placeholder="Ex: Maternal II"></div>
            <div class="campo-input"><label>Gênero</label><select id="genero"><option value="o aluno">O ALUNO</option><option value="a aluna">A ALUNA</option></select></div>
            <div class="campo-input"><label>Período</label><select id="periodo">
                <option>1º BIMESTRE</option><option>2º BIMESTRE</option><option>3º BIMESTRE</option><option>4º BIMESTRE</option>
                <option>1º SEMESTRE</option><option>2º SEMESTRE</option>
            </select></div>
        </div>
        <div id="campos-container"></div>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO PARA 1 FOLHA</button>
    </div>

    <div id="editor" contenteditable="true"></div>

    <div class="no-print" id="btn-print" style="display:none; text-align:center; padding-bottom: 40px;">
        <button onclick="window.print()" style="padding:15px 50px; background:var(--azul); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR AGORA</button>
    </div>

    <script>
        const camposBNCC = [
            {t: "1. O EU, O OUTRO E O NÓS", g: "Vínculos e identidade."},
            {t: "2. CORPO, GESTOS E MOVIMENTOS", g: "Autonomia motora."},
            {t: "3. TRAÇOS, SONS, CORES E FORMAS", g: "Expressão artística."},
            {t: "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", g: "Comunicação e leitura."},
            {t: "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES", g: "Raciocínio lógico."}
        ];

        const cCont = document.getElementById('campos-container');
        camposBNCC.forEach((campo, i) => {
            cCont.innerHTML += `
                <div class="secao-pergunta">
                    <span class="titulo-campo">${campo.t}</span>
                    <span class="guia-professor">${campo.g}</span>
                </div>
                <div class="grid-botoes" id="c-${i}">
                    <div class="btn-v ini" onclick="marcar(${i},'ini',this)">INICIAL</div>
                    <div class="btn-v pro" onclick="marcar(${i},'pro',this)">PROCESSO</div>
                    <div class="btn-v ava" onclick="marcar(${i},'ava',this)">AVANÇADO</div>
                </div>`;
        });

        function marcar(idx, tipo, btn) {
            Array.from(document.getElementById(`c-${idx}`).children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function gerarRelatorio() {
            const esc = document.getElementById('escola').value.toUpperCase();
            const prof = document.getElementById('prof').value.toUpperCase();
            const nome = document.getElementById('crianca').value.toUpperCase();
            const turma = document.getElementById('turma').value.toUpperCase();
            const gen = document.getElementById('genero').value;
            const per = document.getElementById('periodo').value;

            document.getElementById('editor').innerHTML = `
                <div style="text-align:center; font-weight:bold; font-size:13pt; margin-bottom:15px;">ESCOLA: ${esc || '________________________________'}</div>
                <div style="border-bottom: 1.5px solid #000; padding-bottom: 8px; margin-bottom: 15px; font-size: 11pt; line-height: 1.6;">
                    <b>DOCENTE:</b> ${prof}<br>
                    <b>CRIANÇA:</b> ${nome} &nbsp;&nbsp;&nbsp; <b>TURMA:</b> ${turma}<br>
                    <b>PERÍODO:</b> ${per}
                </div>
                <div style="text-align:center; font-weight:bold; margin-bottom:15px; font-size:12pt;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL</div>
                
                <div class="paragrafo">
                    Mediante a estruturação de ambientes que provocam o protagonismo e a curiosidade natural da infância, oportunizou-se ao longo deste processo pedagógico que ${gen} <strong>${nome}</strong> ampliasse sua percepção espacial e temporal através de jogos, brincadeiras de quintal e vivências lúdicas. Demonstrou segurança ao enfrentar desafios motores complexos e uma curiosidade científica ao investigar fenômenos naturais e sociais ao seu redor.
                </div>
                
                <div class="paragrafo">
                    Além disso, demonstrou autonomia ao realizar suas atividades de higiene e alimentação, revelando cuidado consigo e com o próximo. Sua relação com a oralidade foi ampliada significativamente através da participação em saraus literários e contação de histórias, onde associou a ficção com suas próprias vivências.
                </div>
                
                <div class="paragrafo">
                    Concluímos este ciclo celebrando as vitórias individuais e reafirmando o compromisso com a excelência pedagógica. O progresso aqui registrado é fruto de uma mediação afetuosa, preparando a criança para novas e potentes descobertas em seu caminhar.
                </div>

                <p style="text-align:center; margin-top:15px; font-style:italic; font-size:11pt;">"Seu brilho único ilumina nossa sala todos os dias."</p>
                <p style="text-align:center; margin-top:10px; font-size:11pt;">Manaus, 19 de abril de 2026.</p>
                
                <div style="margin-top:30px; text-align:center; font-size:11pt;">
                    <div style="margin-bottom:25px;"><b><div style="border-top:1px solid #000; width:280px; margin:auto;"></div>PROFESSOR(A)</b></div>
                    <div style="margin-bottom:25px;"><b><div style="border-top:1px solid #000; width:280px; margin:auto;"></div>COORDENAÇÃO / DIREÇÃO</b></div>
                    <div style="margin-bottom:5px;"><b><div style="border-top:1px solid #000; width:280px; margin:auto;"></div>RESPONSÁVEL</b></div>
                </div>
            `;
            document.getElementById('editor').style.display = 'block';
            document.getElementById('btn-print').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
