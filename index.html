<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Contaê Profe','short_name':'Contaê','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#ff4757','icons':[{'src':'https://ui-avatars.com/api/?name=CP&background=ff4757&color=ffeaa7&size=512&rounded=true&font-size=0.4','sizes':'512x512','type':'image/png'}]}">
    <meta name="theme-color" content="#ff4757">

    <style>
        :root { 
            --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; 
            --branco: #ffffff; --cor-inicial: #e74c3c; --cor-processo: #f1c40f; --cor-avancado: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }

        #pwa-banner {
            display: none; background: #2f3542; color: white; padding: 12px;
            position: sticky; top: 0; z-index: 9999; text-align: center; font-size: 0.85rem;
        }
        #pwa-banner button {
            background: var(--cor-avancado); border: none; color: white; padding: 6px 12px;
            border-radius: 5px; font-weight: bold; margin-left: 10px; cursor: pointer;
        }

        header { background: var(--primaria); color: white; padding: 25px; text-align: center; }
        .marca-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .mini-bola-cp { background: #ffeaa7; color: #ff4757; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; }
        .logo { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .logo span { color: #ffeaa7; }
        .slogan { font-size: 0.95rem; font-weight: 300; font-style: italic; opacity: 0.9; margin-top: 5px; }

        .container { max-width: 900px; margin: 30px auto; background: var(--branco); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; text-transform: uppercase; outline: none; }
        
        .secao-pergunta { background: var(--azul); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 10px; }
        .titulo-campo { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; opacity: 0.85; letter-spacing: 0.5px; }
        .pergunta-maior { display: block; font-size: 1.1rem; font-weight: 600; margin-top: 4px; line-height: 1.3; }
        
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-v { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: center; background: white; color: #747d8c; font-size: 0.8rem; }
        .btn-v.active { color: white; border-color: transparent; }
        .btn-v.ini.active { background: var(--cor-inicial); }
        .btn-v.pro.active { background: var(--cor-processo); }
        .btn-v.ava.active { background: var(--cor-avancado); }

        .acoes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-gerar { padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: white; background: var(--primaria); cursor: pointer; }
        .btn-limpar { padding: 20px; border: 2px solid #dcdde1; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #747d8c; background: white; }

        #editor { 
            width: 210mm; min-height: 280mm; margin: 20px auto; background: white; 
            padding: 25mm 20mm 15mm 25mm; box-sizing: border-box; font-family: Arial, sans-serif; font-size: 11.5pt; display: none; 
        }
        .corpo-texto { text-align: justify; text-indent: 1.25cm; line-height: 1.7; margin-bottom: 1.2em; }
        .linha-assinatura { border-top: 1px solid #000; width: 60%; margin: 0 auto 5px auto; }

        @media print { 
            @page { size: A4; margin: 0; }
            .no-print, #pwa-banner { display: none !important; } 
            body { background: white; }
            #editor { display: block !important; margin: 0 !important; border: none !important; width: 100%; } 
        }
    </style>
</head>
<body>

<div id="pwa-banner">
    Toque para baixar o Contaê na sua tela inicial! 
    <button onclick="instalarPWA()">BAIXAR APP</button>
</div>

<header class="no-print">
    <div class="marca-container">
        <div class="mini-bola-cp">CP</div>
        <h1 class="logo">CONTAÊ <span>PROFE</span></h1>
    </div>
    <div class="slogan">"Transformando vivências em registros de excelência."</div>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" placeholder="EX: Manaus"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola" placeholder="NOME DA INSTITUIÇÃO"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca"></div>
        <div class="campo"><label>Gênero</label>
            <select id="genero">
                <option value="A CRIANÇA">A CRIANÇA</option>
                <option value="O ALUNO">O ALUNO</option>
                <option value="A ALUNA">A ALUNA</option>
            </select>
        </div>
        <div class="campo"><label>Fase</label><select id="fase"><option>1º PERÍODO</option><option>2º PERÍODO</option></select></div>
        <div class="campo"><label>Turma</label><input type="text" id="turma"></div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option value="1B">1º BIMESTRE</option><option value="2B">2º BIMESTRE</option>
                <option value="3B">3º BIMESTRE</option><option value="4B">4º BIMESTRE</option>
                <option value="1S">1º SEMESTRE</option><option value="2S">2º SEMESTRE</option>
            </select>
        </div>
    </div>
    <div id="campos-container"></div>
    <div class="acoes-container">
        <button class="btn-limpar" onclick="location.reload()">NOVO ALUNO</button>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO</button>
    </div>
</div>

<div id="editor" contenteditable="true"></div>
<div class="no-print" id="btn-print" style="display:none; text-align:center; margin: 20px 0 50px;">
    <button onclick="window.print()" style="padding:15px 60px; background:var(--azul); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR</button>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-banner').style.display = 'block';
    });

    async function instalarPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwa-banner').style.display = 'none';
            deferredPrompt = null;
        }
    }

    const camposBNCC = [
        {t: "1. O EU, O OUTRO E O NÓS", p: "A criança interage bem com os outros e respeita combinados?"},
        {t: "2. CORPO, GESTOS E MOVIMENTOS", p: "A criança demonstra bom equilíbrio e coordenação motora?"},
        {t: "3. TRAÇOS, SONS, CORES E FORMAS", p: "A criança gosta de artes e reconhece cores e sons?"},
        {t: "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", p: "A criança fala com clareza e entende as histórias lidas?"},
        {t: "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES", p: "A criança identifica números e entende a rotina escolar?"}
    ];

    const db = {
        introducao: {
            inicio: [
                "Neste início de jornada pedagógica, pautamos nossa observação nas primeiras interações cotidianas, assegurando os direitos fundamentais de adaptação e acolhimento. ",
                "Ao abrir este ciclo letivo, estruturamos contextos de escuta sensível para compreender as necessidades singulares da criança em seu novo ambiente social. "
            ],
            meio: [
                "Ao longo deste percurso letivo, as estratégias pedagógicas focaram na consolidação de vínculos e na exploração intencional de novos conhecimentos práticos. ",
                "Pautada no registro contínuo das vivências, a prática docente direcionou-se para assegurar que o desenvolvimento ocorresse de forma segura e plena. "
            ],
            fim: [
                "Ao encerrarmos este ciclo de aprendizagens, observamos o amadurecimento dos processos iniciados e a conquista de novos patamares de autonomia e saber. ",
                "Nesta fase de síntese e transição, focamos em contextos que evidenciam o protagonismo alcançado pela criança diante de sua trajetória escolar. "
            ]
        },
        desenvolvimento: {
            ini: [
                "demonstrou estar em fase inicial de entrosamento com o grupo, explorando os materiais de forma individual e buscando a mediação constante do professor. ",
                "revelou curiosidade diante das novas propostas, embora ainda sinta necessidade de apoio para realizar escolhas e seguir a rotina estabelecida. "
            ],
            pro: [
                "encontra-se em pleno processo de desenvolvimento de suas habilidades, participando com interesse das rodas de conversa e colaborando com o coletivo. ",
                "demonstra segurança ao realizar propostas que exigem autonomia, testando hipóteses e comunicando suas descobertas de forma cada vez mais clara. "
            ],
            ava: [
                "revelou um domínio excepcional das competências propostas, liderando iniciativas nas brincadeiras e expressando um pensamento crítico avançado. ",
                "consolidou saberes fundamentais com protagonismo, demonstrando empatia nas relações e um repertório imaginativo vasto e diversificado. "
            ]
        },
        detalhes: [
            "Além disso, observamos uma evolução notória na coordenação motora e na percepção espacial, o que permite à criança circular com segurança pelos ambientes. ",
            "Sua relação com a oralidade e com a escuta atenta foi ampliada através de projetos de leitura e contação de histórias, enriquecendo seu vocabulário. ",
            "Destaca-se ainda o cuidado demonstrado com os materiais de uso coletivo e a prontidão em ajudar os colegas em situações de conflito ou cooperação. ",
            "A curiosidade científica despertada por investigações sobre a natureza permitiu que a criança estabelecesse relações complexas sobre o mundo ao seu redor. "
        ],
        conclusao: {
            inicio: ["Concluímos este período celebrando os primeiros passos e reafirmando o compromisso com o acolhimento constante."],
            meio: ["Finalizamos esta etapa com a certeza de que as sementes do conhecimento estão florescendo de forma lúdica e sólida."],
            fim: ["Encerramos o ano celebrando a autonomia conquistada e o preparo emocional para os novos desafios que virão."]
        },
        frasesFinais: ["Seu brilho único ilumina nossa sala.", "Cada descoberta sua é um motivo para sorrir.", "Sua jornada é inspiradora."]
    };

    let selecoes = {};
    function marcar(idx, n, b) {
        Array.from(document.getElementById(`c-${idx}`).children).forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        selecoes[idx] = n;
    }

    function sortear(l) { return l[Math.floor(Math.random() * l.length)]; }

    function gerarRelatorio() {
        const esc = document.getElementById('escola').value.toUpperCase().trim();
        const nome = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const prof = document.getElementById('prof').value.toUpperCase();
        const cidade = document.getElementById('cidade').value || "Manaus";
        const periodoCod = document.getElementById('periodo').value;
        const periodoTexto = document.querySelector("#periodo option:checked").text;
        
        let intro, conc;
        if(periodoCod === "1B" || periodoCod === "1S") {
            intro = sortear(db.introducao.inicio);
            conc = sortear(db.conclusao.inicio);
        } else if(periodoCod === "2B" || periodoCod === "3B") {
            intro = sortear(db.introducao.meio);
            conc = sortear(db.conclusao.meio);
        } else {
            intro = sortear(db.introducao.fim);
            conc = sortear(db.conclusao.fim);
        }

        // Analisa a média das seleções para definir o corpo principal
        const vals = Object.values(selecoes);
        const freq = vals.reduce((acc, v) => { acc[v] = (acc[v] || 0) + 1; return acc; }, {});
        const dominante = Object.keys(freq).reduce((a, b) => freq[a] > freq[b] ? a : b, 'pro');

        const textoDesenv = sortear(db.desenvolvimento[dominante]);
        const textoDet1 = sortear(db.detalhes);
        const textoDet2 = db.detalhes.filter(f => f !== textoDet1)[Math.floor(Math.random()*3)];

        document.getElementById('editor').innerHTML = `
            <div style="font-size:14pt; font-weight:bold; text-align:center; margin-bottom:0.8cm;">${esc ? 'ESCOLA: ' + esc : 'ESCOLA: INSTITUIÇÃO NÃO INFORMADA'}</div>
            <div style="line-height:1.5; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:0.8cm; text-transform:uppercase;">
                <b>DOCENTE:</b> ${prof}<br>
                <b>CRIANÇA:</b> <b>${nome}</b><br>
                <b>FASE:</b> ${document.getElementById('fase').value} | <b>TURMA:</b> ${document.getElementById('turma').value.toUpperCase()}
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:0.8cm; text-transform:uppercase;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${periodoTexto}</div>
            <div class="corpo-texto">${intro} ${nome} ${textoDesenv}</div>
            <div class="corpo-texto">${textoDet1} ${textoDet2}</div>
            <div class="corpo-texto" style="margin-bottom:0;">${conc}</div>
            <div style="text-align:center; font-style:italic; margin-top:1cm; margin-bottom:1cm;">"${sortear(db.frasesFinais)}"</div>
            <div style="text-align:center; margin:0.8cm 0;">${cidade}, 19 de abril de 2026.</div>
            <div style="margin-top:1.5cm; text-align:center;">
                <div class="linha-assinatura"></div><small>PROFESSOR(A)</small><br><br>
                <div class="linha-assinatura"></div><small>COORDENAÇÃO / DIREÇÃO</small>
            </div>
        `;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    const cCont = document.getElementById('campos-container');
    camposBNCC.forEach((item, i) => {
        cCont.innerHTML += `<div class="secao-pergunta">
                <span class="titulo-campo">${item.t}</span>
                <span class="pergunta-maior">${item.p}</span>
            </div>
            <div class="grid-botoes" id="c-${i}">
                <div class="btn-v ini" onclick="marcar(${i},'ini',this)">INICIAL</div>
                <div class="btn-v pro" onclick="marcar(${i},'pro',this)">PROCESSO</div>
                <div class="btn-v ava" onclick="marcar(${i},'ava',this)">AVANÇADO</div>
            </div>`;
    });
</script>
</body>
</html>
