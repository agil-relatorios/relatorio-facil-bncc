<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Design 3+3</title>
    <style>
        :root { --primaria: #ff4757; --azul: #1e90ff; --verde: #2ed573; --amarelo: #ffa502; --bg: #f1f2f6; --branco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: var(--branco); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* GRID DE INPUTS */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-transform: uppercase; outline: none; }

        /* SEÇÃO DE TÍTULO COM SEMÁFORO */
        .secao-titulo { background: #2f3542; color: white; padding: 12px; border-radius: 8px; margin: 25px 0 10px; font-weight: bold; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .ajuda-cores { display: flex; gap: 10px; }
        .ponto { width: 14px; height: 14px; border-radius: 50%; cursor: help; border: 2px solid rgba(255,255,255,0.2); position: relative; }
        .ponto.az { background: var(--azul); }
        .ponto.vd { background: var(--verde); }
        .ponto.am { background: var(--amarelo); }
        .ponto:hover::after { content: attr(data-info); position: absolute; bottom: 25px; right: 0; background: #333; color: white; padding: 10px; border-radius: 6px; font-size: 11px; width: 250px; z-index: 100; text-transform: none; font-weight: normal; }

        /* DESIGN INTELIGENTE 3+3 (GRID) */
        .grid-3x2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 5px; }
        .btn-voca { padding: 12px 5px; border: 2px solid #f0f0f0; border-radius: 8px; cursor: pointer; font-size: 0.65rem; font-weight: bold; text-align: center; background: white; transition: 0.2s; color: #666; }
        .btn-voca:hover { border-color: #ddd; }
        
        /* CORES POR NÍVEL AO ATIVAR */
        .btn-voca.active[data-nivel="avancado"] { background: var(--azul); color: white; border-color: var(--azul); }
        .btn-voca.active[data-nivel="processo"] { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-voca.active[data-nivel="inicial"] { background: var(--amarelo); color: white; border-color: var(--amarelo); }

        .btn-gerar { width: 100%; padding: 20px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }

        /* CONFIGURAÇÃO ABNT RIGOROSA (IMPRESSÃO) */
        @page { size: A4; margin: 0; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            #editor { border: none !important; width: 210mm; height: 297mm; overflow: hidden; display: block; box-shadow: none; }
        }

        #editor { 
            width: 210mm; height: 297mm; background: white; margin: 20px auto; box-sizing: border-box; 
            padding: 30mm 20mm 20mm 30mm; font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.5; text-align: justify; border: 1px solid #eee;
        }

        .cabecalho-oficial { text-align: center; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; line-height: 1.2; }
        .dados-aluno { margin-bottom: 15px; border-bottom: 1px solid black; padding-bottom: 8px; font-size: 10pt; line-height: 1.5; }
        .secao-assinaturas { margin-top: 40px; }
        .bloco-assinatura { width: 90%; margin: 35px auto 0 auto; text-align: center; }
        .linha { border-top: 1px solid black; width: 100%; margin-bottom: 4px; }
        .cargo { font-size: 9pt; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="container no-print">
    <h1 style="text-align:center; color:var(--primaria); margin-top:0">CONTAÊ PROFE</h1>
    
    <div class="grid-inputs">
        <div class="campo"><label>Escola</label><input type="text" id="escola" placeholder="Instituição"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof" placeholder="Nome Completo"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca" placeholder="Nome do Aluno"></div>
        <div class="campo"><label>Fase/Turma</label><input type="text" id="turma" placeholder="Ex: 1º Período"></div>
    </div>

    <div id="painel-pedagogico"></div>

    <button class="btn-gerar" onclick="gerar()">📝 GERAR RELATÓRIO PÁGINA ÚNICA</button>
</div>

<div id="resultado-secao" style="display:none">
    <div id="editor" contenteditable="true"></div>
    <div class="no-print" style="text-align:center; margin-bottom: 50px;">
        <button onclick="window.print()" style="padding:15px 50px; background:var(--azul); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR / PDF</button>
        <button onclick="location.reload()" style="padding:15px; background:#666; color:white; border:none; border-radius:10px; cursor:pointer; margin-left:10px;">LIMPAR</button>
    </div>
</div>

<script>
    const camposBNCC = [
        "1. O Eu, o Outro e o Nós",
        "2. Corpo, Gestos e Movimentos",
        "3. Traços, Sons, Cores e Formas",
        "4. Escuta, Fala, Pensamento e Imaginação",
        "5. Espaço, Tempo, Quantidades e Relações"
    ];

    const vocabularios = [
        { label: "EXPLORAR", nivel: "inicial" },
        { label: "DESENVOLVER", nivel: "processo" },
        { label: "PROTAGONIZAR", nivel: "avancado" },
        { label: "OBSERVAR", nivel: "inicial" },
        { label: "INTERAGIR", nivel: "processo" },
        { label: "CRIAR", nivel: "avancado" }
    ];

    const infoCores = {
        az: "PROTAGONIZAR/CRIAR (AZUL): Autonomia plena. Propõe soluções e lidera processos criativos.",
        vd: "DESENVOLVER/INTERAGIR (VERDE): Processo em curso. Já compreende a lógica, mas requer mediação.",
        am: "EXPLORAR/OBSERVAR (AMARELO): Descoberta e curiosidade inicial. Fase de sensibilização do aprendizado."
    };

    const selecoes = {};

    function iniciar() {
        const painel = document.getElementById('painel-pedagogico');
        camposBNCC.forEach((campo, i) => {
            selecoes[i] = [];
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="secao-titulo">
                    ${campo}
                    <div class="ajuda-cores">
                        <div class="ponto am" data-info="${infoCores.am}"></div>
                        <div class="ponto vd" data-info="${infoCores.vd}"></div>
                        <div class="ponto az" data-info="${infoCores.az}"></div>
                    </div>
                </div>
                <div class="grid-3x2" id="grid-${i}"></div>
            `;
            painel.appendChild(div);
            
            const gridBotao = document.getElementById(`grid-${i}`);
            vocabularios.forEach(v => {
                const btn = document.createElement('div');
                btn.className = 'btn-voca';
                btn.innerText = v.label;
                btn.dataset.nivel = v.nivel;
                btn.onclick = () => {
                    btn.classList.toggle('active');
                    if(btn.classList.contains('active')) selecoes[i].push(v.label.toLowerCase());
                    else selecoes[i] = selecoes[i].filter(item => item !== v.label.toLowerCase());
                };
                gridBotao.appendChild(btn);
            });
        });
    }

    function gerar() {
        const escola = document.getElementById('escola').value.toUpperCase() || "INSTITUIÇÃO DE ENSINO";
        const prof = document.getElementById('prof').value.toUpperCase() || "PROFESSOR(A)";
        const crianca = document.getElementById('crianca').value.toUpperCase() || "NOME DO ALUNO";
        const turma = document.getElementById('turma').value.toUpperCase();
        const dataH = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });

        let relatorioBNCC = "";
        Object.keys(selecoes).forEach(id => {
            if(selecoes[id].length > 0) {
                const campoNome = camposBNCC[id].split('. ')[1];
                relatorioBNCC += ` No campo <b>${campoNome}</b>, demonstrou avanços ao ${selecoes[id].join(', ')} as propostas pedagógicas.`;
            }
        });

        const html = `
            <div class="cabecalho-oficial">${escola}<br>RELATÓRIO DE DESENVOLVIMENTO INTEGRAL</div>
            <div class="dados-aluno">
                <b>ALUNO(A):</b> ${crianca}<br>
                <b>PROFESSOR(A):</b> ${prof} | <b>TURMA:</b> ${turma} | <b>DATA:</b> ${dataH}
            </div>
            <div style="text-align:center; font-weight:bold; margin: 15px 0; text-transform:uppercase;">Parecer Descritivo Individual</div>
            <p style="text-indent:1.5cm">Durante este semestre, as vivências de <b>${crianca}</b> foram norteadas pelos direitos de aprendizagem da BNCC. A acolhida priorizou o bem-estar e o respeito ao ritmo individual, garantindo segurança nas explorações escolares.</p>
            <p style="text-indent:1.5cm">${relatorioBNCC} Percebe-se um desenvolvimento harmônico e constante, absorvendo novos conhecimentos com facilidade e interagindo com alegria às dinâmicas do grupo.</p>
            <p style="text-align:center; margin-top:15px"><i>"Seu brilho único ilumina nossa sala todos os dias."</i></p>
            <div class="secao-assinaturas">
                <div class="bloco-assinatura"><div class="linha"></div><div class="cargo">Gestor(a)</div></div>
                <div class="bloco-assinatura"><div class="linha"></div><div class="cargo">Professor(a)</div></div>
                <div class="bloco-assinatura"><div class="linha"></div><div class="cargo">Responsável</div></div>
            </div>
        `;

        document.getElementById('editor').innerHTML = html;
        document.getElementById('resultado-secao').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
    iniciar();
</script>
</body></html>
