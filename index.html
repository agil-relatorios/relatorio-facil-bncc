<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre - Inteligência Pedagógica</title>
    <style>
        /* INTERFACE DO USUÁRIO */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #2c3e50; margin: 0; padding: 20px; }
        .no-print { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a5276; border-bottom: 4px solid #ffcb05; padding-bottom: 10px; }
        .grid-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-top: 10px; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .secao-titulo { background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 25px; font-weight: bold; color: #1a5276; border-left: 5px solid #ffcb05; }
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        
        /* BOTÕES COLORIDOS */
        .btn-check { padding: 10px 18px; border: 1px solid #dcdde1; border-radius: 20px; cursor: pointer; background: white; font-size: 13px; transition: 0.3s; font-weight: 500; }
        .btn-check.avancado.active { background: #2980b9 !important; color: white; border-color: #1a5276; }
        .btn-check.intermediario.active { background: #27ae60 !important; color: white; border-color: #1e8449; }
        .btn-check.inicial.active { background: #f1c40f !important; color: #2c3e50; border-color: #d4ac0d; }
        .btn-check.marcado.active { background: #636e72 !important; color: white; }

        .btn-principal { width: 100%; padding: 18px; margin-top: 20px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-frase { background: #2980b9; }
        .btn-texto { background: #8e44ad; }
        
        /* FOLHA ABNT */
        #folhaA4 { 
            display: none; background: white; width: 210mm; min-height: 297mm; 
            padding: 3cm 2cm 2cm 3cm; margin: 30px auto;
            font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.5; 
            text-align: justify; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .paragrafo-abnt { text-indent: 1.25cm; margin: 0; padding-bottom: 12px; }
        .assinaturas { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: center; font-size: 10pt; }

        @media print {
            .no-print { display: none; }
            #folhaA4 { display: block !important; border: none; margin: 0; width: 100%; box-shadow: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <button style="background:#e67e22; color:white; border:none; padding:12px; border-radius:8px; width:100%; cursor:pointer; font-weight:bold;" onclick="abrirManual()">📖 MANUAL DE USO E TERMOS</button>
    <h1>EducaNobre 🍎</h1>

    <div class="grid-info">
        <div><label>Nome da Criança:</label><input type="text" id="nome"></div>
        <div><label>Idade / Faixa Etária:</label>
            <select id="idade">
                <option value="bebês">Bebês (0 a 1a 6m)</option>
                <option value="bem-pequenas">Crianças Bem Pequenas (1a 7m a 3a 11m)</option>
                <option value="pequenas">Crianças Pequenas (4a a 5a 11m)</option>
            </select>
        </div>
        <div><label>Professor(a):</label><input type="text" id="professor"></div>
        <div><label>Escola:</label><input type="text" id="escola"></div>
        <div><label>Cidade:</label><input type="text" id="cidade"></div>
    </div>

    <div class="secao-titulo">HABILIDADES BNCC (CLIQUE PARA AVALIAR)</div>
    <div id="hab-container"></div>

    <div class="secao-titulo">INTENCIONALIDADE PEDAGÓGICA</div>
    <div class="flex-buttons" id="rotina-container"></div>

    <div class="secao-titulo">CATEGORIAS DE ATIVIDADES</div>
    <div class="flex-buttons" id="atividades-container"></div>

    <button class="btn-principal btn-frase" onclick="gerar('FRASE')">GERAR FRASE DESCRIÇÃO</button>
    <button class="btn-principal btn-texto" onclick="gerar('TEXTO')">GERAR TEXTO RELATÓRIO (ABNT)</button>
    <button onclick="window.print()" style="width:100%; padding:12px; background:#2c3e50; color:white; border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-weight:bold;">🖨️ IMPRIMIR / SALVAR PDF PROFISSIONAL</button>
</div>

<div id="folhaA4">
    <div id="cabecalhoA4" style="text-align:center; font-weight:bold; text-transform:uppercase; margin-bottom:30px;"></div>
    <div id="conteudoA4" contenteditable="true"></div>
    <div id="rodapeA4" style="text-align:right; margin-top:40px;"></div>
    <div class="assinaturas">
        <div>_______________________<br>GESTOR(A)</div>
        <div>_______________________<br>PROFESSOR(A)</div>
        <div>_______________________<br>RESPONSÁVEL</div>
    </div>
</div>

<script>
    const hbs = ["Coordenação Motora Ampla", "Coordenação Motora Fina", "Linguagem Oral", "Nome Próprio", "Aprendizagem", "Socioafetivo", "Participação", "Desenvolvimento Cognitivo", "Convívio Social"];
    const rots = ["Acolhimento e Despedida", "Atividade de livre escolha", "Momentos de grande grupo", "Momentos de pequenos grupos", "Área externa", "Rotina de cuidados"];
    const ativs = ["Pintura e Colagem", "Modelagem", "Música e Ritmo", "Contação de Histórias", "Jogos de Associação", "Desafios Lógicos", "Circuitos Motores", "Brincadeiras Clássicas", "Atividades ao Ar Livre"];
    
    let selecaoHab = {};
    let selecaoExtra = { rotina: [], atividades: [] };

    function init() {
        const hContainer = document.getElementById('hab-container');
        hbs.forEach(h => {
            const div = document.createElement('div');
            div.innerHTML = `<label>${h}:</label>
                <div class="flex-buttons">
                    <button class="btn-check avancado" onclick="marcarHab('${h}','avancado', this)">Avançado</button>
                    <button class="btn-check intermediario" onclick="marcarHab('${h}','intermediario', this)">Intermediário</button>
                    <button class="btn-check inicial" onclick="marcarHab('${h}','inicial', this)">Inicial</button>
                </div>`;
            hContainer.appendChild(div);
        });
        
        rots.forEach(r => document.getElementById('rotina-container').innerHTML += `<button class="btn-check marcado" onclick="toggleExtra('${r}','rotina',this)">${r}</button>`);
        ativs.forEach(a => document.getElementById('atividades-container').innerHTML += `<button class="btn-check marcado" onclick="toggleExtra('${a}','atividades',this)">${a}</button>`);
    }

    function marcarHab(h, n, b) {
        Array.from(b.parentElement.children).forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        selecaoHab[h] = n;
    }

    function toggleExtra(v, s, b) {
        b.classList.toggle('active');
        const idx = selecaoExtra[s].indexOf(v);
        if(idx > -1) selecaoExtra[s].splice(idx,1); else selecaoExtra[s].push(v);
    }

    function sortear(hab, nivel) {
        const conectores = ["Além disso, ", "Somado a isso, ", "No que concerne ao desenvolvimento, ", "Vale destacar que ", "De forma processual, "];
        const bancos = {
            "avancado": ["demonstra protagonismo e segurança em suas ações.", "realiza as propostas com autonomia e criatividade.", "apresenta domínio pleno das habilidades esperadas."],
            "intermediario": ["está em fase de consolidação das aprendizagens.", "demonstra avanços significativos com mediação pontual.", "desenvolve-se gradualmente nas vivências propostas."],
            "inicial": ["necessita de mediação constante para realizar as tarefas.", "está iniciando a exploração dos conceitos com apoio.", "demonstra as primeiras tentativas de interação com o objeto."]
        };
        const c = conectores[Math.floor(Math.random()*conectores.length)];
        const b = bancos[nivel][Math.floor(Math.random()*bancos[nivel].length)];
        return c + " a criança " + b;
    }

    function gerar(tipo) {
        const nome = document.getElementById('nome').value;
        const nomeCAIXA = nome.toUpperCase() || "A CRIANÇA";
        const primeiroNome = nome.split(' ')[0] || "A criança";
        const escola = document.getElementById('escola').value.toUpperCase();
        const prof = document.getElementById('professor').value.toUpperCase();
        const cidade = document.getElementById('cidade').value.toUpperCase();
        const data = new Date().toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'});

        document.getElementById('cabecalhoA4').innerHTML = `${escola}<br>RELATÓRIO PEDAGÓGICO DE ACOMPANHAMENTO`;
        document.getElementById('rodapeA4').innerText = `${cidade}, ${data}`;
        
        let texto = "";
        if(tipo === 'TEXTO') {
            texto += `<p class="paragrafo-abnt"><b>INTRODUÇÃO:</b> O presente relatório descreve o percurso de aprendizagem de ${nomeCAIXA}, pautado nos Direitos de Aprendizagem e Objetivos da BNCC e DCNEI. </p>`;
            texto += `<p class="paragrafo-abnt"><b>DESENVOLVIMENTO:</b> Durante os momentos de ${selecaoExtra.rotina.join(", ")}, observamos a participação em ${selecaoExtra.atividades.join(", ")}. </p>`;
            
            Object.keys(selecaoHab).forEach((h, i) => {
                let sujeito = i === 0 ? primeiroNome : (i % 2 === 0 ? "o aluno(a)" : "a criança");
                texto += `<p class="paragrafo-abnt">${sujeito} em relação à ${h.toLowerCase()}, ${sortear(h, selecaoHab[h])}</p>`;
            });
            texto += `<p class="paragrafo-abnt"><b>CONCLUSÃO:</b> Diante do exposto, nota-se um desenvolvimento harmônico, fruto da mediação pedagógica constante.</p>`;
        } else {
            Object.keys(selecaoHab).forEach(h => texto += `<p class="paragrafo-abnt"><b>${h.toUpperCase()}:</b> ${sortear(h, selecaoHab[h])}</p>`);
        }

        document.getElementById('conteudoA4').innerHTML = texto;
        document.getElementById('folhaA4').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function abrirManual() {
        alert("EDUCA NOBRE - MANUAL\n\n1. Preencha os dados (Escola, Professor e Criança).\n2. Selecione as habilidades (Cores indicam o nível).\n3. Marque as rotinas e atividades.\n4. Clique em GERAR TEXTO para o relatório ABNT.\n5. O nome da criança aparecerá em CAIXA ALTA apenas no início para destaque.\n6. Use o botão IMPRIMIR para gerar o PDF A4 oficial.");
    }

    init();
</script>
</body>
</html>
