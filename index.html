<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre - Padrão ABNT</title>
    <style>
        /* Estilos para a tela do computador/celular */
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .no-print { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a5276; text-align: center; border-bottom: 2px solid #ffcb05; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background-color: #27ae60; color: white; flex: 1; }
        .btn-clear { background-color: #e74c3c; color: white; }
        .btn-manual { background-color: #f39c12; color: white; width: 100%; margin-bottom: 10px; }
        .btn-copy { background-color: #2980b9; color: white; }
        .btn-print { background-color: #34495e; color: white; width: 100%; margin-top: 15px; font-size: 16px; }

        /* Formatação ABNT para o Relatório Gerado e Impressão */
        #relatorioFinal { 
            display: none; 
            background: white; 
            padding: 3cm 2cm 2cm 3cm; /* Margens ABNT: Topo 3, Dir 2, Base 2, Esq 3 */
            width: 210mm; /* Largura A4 */
            min-height: 297mm; /* Altura A4 */
            margin: 20px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: justify;
            line-height: 1.5;
            font-size: 12pt;
        }

        @media print {
            body { background: none; padding: 0; }
            .no-print { display: none; }
            #relatorioFinal { display: block !important; box-shadow: none; margin: 0; border: none; }
            @page { size: A4; margin: 0; }
        }

        .header-relatorio { text-align: center; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid #000; padding-bottom: 10px; }
        .campo-bloco { margin-bottom: 20px; }
        .campo-titulo { font-weight: bold; text-decoration: underline; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn-manual" onclick="alert('Manual: 1. Digite o nome. 2. Selecione o campo e nível. 3. Clique em Adicionar Campo (repita para quantos campos quiser). 4. Imprima seu ABNT.')">📖 Manual de Uso</button>
    <h1>EducaNobre 🍎</h1>
    
    <label>Nome do Aluno:</label>
    <input type="text" id="nomeAluno" placeholder="Nome completo">

    <label>Selecione o Campo da BNCC:</label>
    <select id="campo">
        <option value="O eu, o outro e o nós">O eu, o outro e o nós</option>
        <option value="Corpo, gestos e movimentos">Corpo, gestos e movimentos</option>
        <option value="Traços, sons, cores e formas">Traços, sons, cores e formas</option>
        <option value="Escuta, fala, pensamento e imaginação">Escuta, fala, pensamento e imaginação</option>
        <option value="Espaços, tempos, quantidades, relações e transformações">Espaços, tempos, quantidades</option>
    </select>

    <label>Nível:</label>
    <select id="nivel">
        <option value="avancado">Desenvolvimento Pleno</option>
        <option value="intermediario">Em Evolução</option>
        <option value="inicial">Início de Trajetória</option>
    </select>

    <label>Observações Adicionais:</label>
    <textarea id="obs" rows="3" placeholder="Anotações espontâneas do professor..."></textarea>

    <div class="btn-group">
        <button class="btn-add" onclick="adicionarCampo()">➕ Adicionar ao Relatório</button>
        <button class="btn-clear" onclick="limparTudo()">Limpar</button>
    </div>

    <button class="btn-print" onclick="window.print()">🖨️ Gerar PDF / Imprimir (Padrão ABNT)</button>
    <button class="btn-copy" onclick="copiarTudo()" style="width:100%; margin-top:10px;">📋 Copiar Texto Completo</button>
</div>

<div id="relatorioFinal">
    <div class="header-relatorio">
        Relatório Individual de Acompanhamento do Desenvolvimento Infantil<br>
        <span id="displayNome" style="font-size: 14pt;"></span>
    </div>
    <div id="conteudoRelatorio"></div>
    <div id="dataFinal" style="margin-top: 50px; text-align: right;"></div>
    <div style="margin-top: 80px; text-align: center;">
        ________________________________________________<br>
        Assinatura do Professor(a)
    </div>
</div>

<script>
    let blocosRelatorio = [];

    function gerarFraseSorteada(campo, nivel) {
        // Banco de dados dinâmico para gerar centenas de combinações
        const inicios = ["Observamos que ", "Neste período, ", "É visível que ", "No cotidiano escolar, ", "Com entusiasmo, "];
        const meios = {
            "avancado": ["demonstra grande autonomia ", "apresenta segurança e protagonismo ", "manifesta facilidade em expressar ", "lidera com naturalidade "],
            "intermediario": ["está em fase de consolidação de ", "demonstra progressos significativos em ", "busca apoio para aprimorar ", "explora com curiosidade "],
            "inicial": ["inicia suas primeiras interações com ", "necessita de mediação carinhosa para ", "está sendo estimulado a descobrir ", "demonstra as primeiras tentativas de "]
        };
        const fins = [" durante as vivências propostas.", " respeitando o tempo de maturação.", " em harmonia com os colegas.", " com foco no desenvolvimento integral."];

        const r1 = inicios[Math.floor(Math.random() * inicios.length)];
        const r2 = meios[nivel][Math.floor(Math.random() * meios[nivel].length)];
        const r3 = fins[Math.floor(Math.random() * fins.length)];

        return r1 + r2 + r3;
    }

    function adicionarCampo() {
        const nome = document.getElementById('nomeAluno').value || "A criança";
        const campo = document.getElementById('campo').value;
        const nivel = document.getElementById('nivel').value;
        const obsAdicional = document.getElementById('obs').value;

        const fraseGerada = gerarFraseSorteada(campo, nivel);
        const bloco = {
            titulo: campo,
            texto: `${fraseGerada} ${obsAdicional ? "Observamos ainda que " + obsAdicional : ""}`
        };

        blocosRelatorio.push(bloco);
        renderizarRelatorio();
        document.getElementById('obs').value = ""; // Limpa campo de texto para o próximo
    }

    function renderizarRelatorio() {
        const nome = document.getElementById('nomeAluno').value || "ALUNO NÃO IDENTIFICADO";
        document.getElementById('displayNome').innerText = nome;
        
        let htmlHtml = "";
        blocosRelatorio.forEach(b => {
            htmlHtml += `<div class="campo-bloco"><span class="campo-titulo">${b.titulo}</span><p>${b.texto}</p></div>`;
        });

        document.getElementById('conteudoRelatorio').innerHTML = htmlHtml;
        document.getElementById('relatorioFinal').style.display = 'block';
        document.getElementById('dataFinal').innerText = "Gerado em: " + new Date().toLocaleDateString('pt-BR');
    }

    function limparTudo() {
        blocosRelatorio = [];
        document.getElementById('conteudoRelatorio').innerHTML = "";
        document.getElementById('relatorioFinal').style.display = 'none';
        document.getElementById('nomeAluno').value = "";
    }

    function copiarTudo() {
        const texto = document.getElementById('relatorioFinal').innerText;
        navigator.clipboard.writeText(texto).then(() => alert("Relatório ABNT copiado!"));
    }
</script>

</body>
</html>
