    function iniciar() {
        const cCont = document.getElementById('campos-container');
        if (!cCont) return;
        camposBNCC.forEach((item, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `<div class="secao-pergunta">
                <span class="campo-nome">${item.n}</span>
                <div class="header-pergunta">
                    <p class="pergunta-texto">${item.p}</p>
                    <button class="btn-ajuda" onclick="alternarAjuda(${idx})">?</button>
                </div>
                <div class="info-pedagogica" id="info-${idx}">${item.info}</div>
            </div>
            <div class="grid-botoes" id="c-${idx}">
                <div class="btn-v ini" onclick="marcar(${idx}, 'ini', this)">COM MEDIAÇÃO</div>
                <div class="btn-v pro" onclick="marcar(${idx}, 'pro', this)">EM PROCESSO</div>
                <div class="btn-v ava" onclick="marcar(${idx}, 'ava', this)">COM AUTONOMIA</div>
            </div>`;
            cCont.appendChild(div);
        });
    }

    function alternarAjuda(idx) { document.getElementById(`info-${idx}`).classList.toggle('show'); }
    function marcar(idx, n, b) { Array.from(document.getElementById(`c-${idx}`).children).forEach(x => x.classList.remove('active')); b.classList.add('active'); }
    function sortear(l) { return l[Math.floor(Math.random() * l.length)]; }

    function formatarCidade(str) {
        const excessoes = ['de', 'do', 'da', 'dos', 'das', 'e'];
        return str.toLowerCase().split(' ').map((p, i) => {
            if (i > 0 && excessoes.includes(p)) return p;
            return p.charAt(0).toUpperCase() + p.slice(1);
        }).join(' ');
    }

    function gerarRelatorio() {
        let escolaInput = document.getElementById('escola').value.toUpperCase();
        const nomeEscolaFinal = escolaInput ? "ESCOLA: " + escolaInput : "INSTITUIÇÃO NÃO INFORMADA";
        
        const nomeAlu = document.getElementById('crianca').value.toUpperCase();
        const cidadeRaw = document.getElementById('cidade').value || "Sua Cidade";
        const cidadeFormatada = formatarCidade(cidadeRaw);
        
        const p1 = sortear(db.inicio) + nomeAlu + " " + sortear(db.meio);
        const p2 = sortear(db.detalhes);
        const p3 = sortear(db.conclusao);

        document.getElementById('editor').innerHTML = `
            <div class="esc-nome">${nomeEscolaFinal}</div>
            <div class="bloco-dados">
                <b>DOCENTE:</b> ${document.getElementById('prof').value.toUpperCase()}<br>
                <b>CRIANÇA:</b> ${nomeAlu}<br>
                <b>FASE:</b> ${document.getElementById('fase').value} | <b>TURMA:</b> ${document.getElementById('turma').value.toUpperCase()}
            </div>
            <div class="tit-parecer">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${document.getElementById('periodo').value}</div>
            
            <div class="corpo-texto">${p1}</div>
            <div class="corpo-texto">${p2}</div>
            <div class="corpo-texto">${p3}</div>

            <div class="data-local">${cidadeFormatada}, 20 de Abril de 2026.</div>
            <div class="assinaturas-duplas">
                <div class="bloco-assinatura"><div class="linha-assinatura"></div><span class="label-assinatura">Professor(a)</span></div>
                <div class="bloco-assinatura"><div class="linha-assinatura"></div><span class="label-assinatura">Coordenação / Direção</span></div>
            </div>
            <div class="assinatura-unica"><div class="linha-assinatura"></div><span class="label-assinatura">Responsável</span></div>
        `;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'flex';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function salvarRelatorio() {
        const conteudo = document.getElementById('editor').innerHTML;
        const nomeAlu = document.getElementById('crianca').value || "Relatorio";
        const blob = new Blob(['<html><head><meta charset="UTF-8"><style>body{padding:20px;font-family:Arial;} .linha-assinatura{border-top:1px solid #000;margin-top:40px;} .corpo-texto{text-align:justify;margin-bottom:20px;}</style></head><body>' + conteudo + '</body></html>'], {type: "text/html"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Relatorio_${nomeAlu}.html`;
        link.click();
    }
