<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Oficial</title>

    <link rel="manifest" href="data:application/manifest+json,{'name':'Contaê Profe','short_name':'Contaê','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#ff4757','icons':[{'src':'https://ui-avatars.com/api/?name=CP&background=ff4757&color=ffeaa7&size=512&rounded=true','sizes':'512x512','type':'image/png'}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { 
            --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; 
            --branco: #ffffff; --cor-ini: #e74c3c; --cor-pro: #f1c40f; --cor-ava: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 25px; text-align: center; }
        .logo { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .logo span { color: #ffeaa7; }
        
        .container { max-width: 900px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 0.9rem; text-transform: uppercase; }
        
        .secao-pergunta { background: var(--azul); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px; }
        .pergunta-texto { font-size: 0.95rem; font-weight: 600; }

        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-v { padding: 15px 5px; border: 2px solid #edeff2; border-radius: 10px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-align: center; background: white; transition: 0.3s; }
        
        /* Cores Ativas */
        .btn-v.ini.active { background: var(--cor-ini); color: white; border-color: var(--cor-ini); }
        .btn-v.pro.active { background: var(--cor-pro); color: white; border-color: var(--cor-pro); }
        .btn-v.ava.active { background: var(--cor-ava); color: white; border-color: var(--cor-ava); }

        .acoes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-gerar { padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; background: var(--primaria); }
        .btn-limpar { padding: 20px; border: 2px solid #dcdde1; border-radius: 15px; font-weight: bold; cursor: pointer; background: white; }

        /* AREA DE IMPRESSÃO - ESTILO DOCUMENTO OFICIAL */
        #editor { width: 210mm; min-height: 297mm; margin: 20px auto; background: white; padding: 25mm 20mm; font-family: Arial, sans-serif; font-size: 12pt; color: #000; display: none; line-height: 1.5; }
        .esc-nome { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 1cm; text-transform: uppercase; }
        .bloco-dados { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; font-size: 10pt; }
        .corpo-texto { text-align: justify; text-indent: 1.25cm; margin-bottom: 15px; }
        .data-local { text-align: center; margin-top: 50px; }
        .assinaturas { margin-top: 60px; display: flex; flex-direction: column; align-items: center; }
        .linha { border-top: 1px solid #000; width: 250px; margin-top: 40px; text-align: center; font-size: 9pt; font-weight: bold; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; }
            #editor { display: block !important; margin: 0; border: none; width: 100%; } 
        }
    </style>
</head>
<body>

<header class="no-print">
    <h1 class="logo">CONTAÊ <span>PROFE</span></h1>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Escola</label><input type="text" id="escola" placeholder="NOME DA ESCOLA"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca"></div>
        <div class="campo"><label>Turma</label><input type="text" id="turma"></div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option>1º BIMESTRE</option><option>2º BIMESTRE</option><option>3º BIMESTRE</option>
                <option>4º BIMESTRE</option><option>1º SEMESTRE</option><option>2º SEMESTRE</option>
            </select>
        </div>
    </div>

    <div id="campos-container"></div>

    <div class="acoes-container">
        <button class="btn-limpar" onclick="location.reload()">NOVO ALUNO</button>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO</button>
    </div>
</div>

<div id="editor" contenteditable="true"></div>
<div class="no-print" id="btn-print" style="display:none; text-align:center; padding: 20px;">
    <button onclick="window.print()" style="padding:15px 50px; background:var(--azul); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR / SALVAR PDF</button>
</div>

<script>
    const camposBNCC = [
        "1. O EU, O OUTRO E O NÓS",
        "2. CORPO, GESTOS E MOVIMENTOS",
        "3. TRAÇOS, SONS, CORES E FORMAS",
        "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO",
        "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES"
    ];

    // BANCO DE DADOS INTELIGENTE POR NÍVEL (COM BASE JURÍDICA BNCC)
    const banco = {
        ini: { // COM MEDIAÇÃO (Vermelho)
            intro: "Neste período, a prática pedagógica focou no acolhimento e na mediação constante, garantindo os direitos de conviver e conhecer-se. Observou-se que a criança encontra-se em fase de adaptação à rotina coletiva. ",
            desenvolvimento: "Necessita de mediação direta do adulto para organizar suas ações nos momentos de higiene e alimentação. Nas interações, a docente atua como ponte para auxiliar na expressão de desejos e na aceitação dos limites e combinados. Requer suporte para engajar-se em propostas de grupo, demonstrando que a internalização das normas de convívio está em pleno processo de sensibilização sob o olhar atento do educador. ",
            conclusao: "As intencionalidades pedagógicas para o próximo ciclo focarão na ampliação da segurança emocional e no fortalecimento de vínculos, respeitando o tempo singular da criança e oferecendo novos contextos de exploração."
        },
        pro: { // EM PROCESSO (Amarelo)
            intro: "Pautamos nossa ação educativa na oferta de contextos que provocam o protagonismo gradual, respeitando a trajetória individual e os marcos de aprendizagem. ",
            desenvolvimento: "A criança demonstra avanços significativos na autonomia, realizando algumas atividades da rotina com mediações pontuais. Participa das rodas de conversa e começa a resolver conflitos através do diálogo, exercendo seu direito de participar e expressar-se. Embora ainda busque a validação do professor para testar novas hipóteses, revela curiosidade e engajamento nas propostas coletivas e artísticas. ",
            conclusao: "Encerramos este ciclo observando um florescimento contínuo. Continuaremos a oferecer desafios que instiguem a independência e a consolidação dos saberes iniciados neste bimestre."
        },
        ava: { // AUTONOMIA (Verde)
            intro: "Neste estágio, os direitos de brincar, participar e explorar foram exercidos com pleno protagonismo, garantindo excelência no desenvolvimento integral da criança. ",
            desenvolvimento: "Manifesta total autonomia e segurança ao circular pelos espaços da escola. Interage com os pares de forma empática e lidera iniciativas em pequenos grupos, demonstrando domínio das normas de convívio e um pensamento crítico apurado. Realiza as atividades de autocuidado com independência e utiliza diferentes linguagens para expressar suas descobertas e sentimentos com clareza e criatividade. ",
            conclusao: "As conquistas deste período são alicerces sólidos. A criança consolidou saberes essenciais e segue para as próximas vivências com segurança emocional e uma curiosidade científica aguçada."
        }
    };

    let escolhas = {};

    function iniciar() {
        const cCont = document.getElementById('campos-container');
        camposBNCC.forEach((n, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="secao-pergunta"><span class="pergunta-texto">${n}</span></div>
                <div class="grid-botoes" id="c-${idx}">
                    <div class="btn-v ini" onclick="marcar(${idx}, 'ini', this)">COM MEDIAÇÃO</div>
                    <div class="btn-v pro" onclick="marcar(${idx}, 'pro', this)">EM PROCESSO</div>
                    <div class="btn-v ava" onclick="marcar(${idx}, 'ava', this)">AUTONOMIA</div>
                </div>`;
            cCont.appendChild(div);
        });
    }

    function marcar(idx, nivel, btn) {
        Array.from(document.getElementById(`c-${idx}`).children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        escolhas[idx] = nivel;
    }

    function gerarRelatorio() {
        const nome = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const esc = document.getElementById('escola').value.toUpperCase() || "INSTITUIÇÃO NÃO INFORMADA";
        const prof = document.getElementById('prof').value.toUpperCase();
        const per = document.getElementById('periodo').value;
        const turma = document.getElementById('turma').value.toUpperCase();

        // Lógica de Predominância: Qual cor foi mais clicada?
        const contagem = { ini: 0, pro: 0, ava: 0 };
        Object.values(escolhas).forEach(v => contagem[v]++);
        
        let nivelFinal = 'pro'; // Padrão
        if (contagem.ini >= 3) nivelFinal = 'ini';
        if (contagem.ava >= 3) nivelFinal = 'ava';

        const texto = banco[nivelFinal];

        document.getElementById('editor').innerHTML = `
            <div class="esc-nome">${esc}</div>
            <div class="bloco-dados">
                <b>DOCENTE:</b> ${prof}<br>
                <b>CRIANÇA:</b> <b>${nome}</b><br>
                <b>TURMA:</b> ${turma} | <b>PERÍODO:</b> ${per}
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:20px;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL</div>
            <div class="corpo-texto">${texto.intro}</div>
            <div class="corpo-texto"><b>${nome}</b> ${texto.desenvolvimento}</div>
            <div class="corpo-texto">${texto.conclusao}</div>
            <div class="data-local">Manaus, 19 de Abril de 2026.</div>
            <div class="assinaturas">
                <div class="linha">Professor(a)</div>
                <div class="linha">Coordenação / Direção</div>
                <div class="linha">Responsável</div>
            </div>
        `;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    iniciar();
</script>
</body>
</html>
