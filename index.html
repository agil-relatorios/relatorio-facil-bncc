<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Inteligência Pedagógica</title>
    <style>
        :root { --primaria: #ff4757; --secundaria: #2ed573; --terciaria: #1e90ff; --txt: #2f3542; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px; }
        .app-container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primaria); margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primaria); font-size: 2.5rem; letter-spacing: -1px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 10px; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 10px; text-transform: uppercase; }
        .secao-titulo { background: #f8f9fa; padding: 10px; border-radius: 8px; margin: 20px 0 10px; font-weight: bold; border-left: 5px solid var(--primaria); }
        .card-hab { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        .btn-opt { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; background: #eee; }
        .active-azul { background: var(--terciaria) !important; color: white; }
        .active-verde { background: var(--secundaria) !important; color: white; }
        .active-amarelo { background: #f1c40f !important; color: black; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        
        /* ABNT RIGOROSA */
        #areaImpressao { 
            display: none; background: white; width: 210mm; min-height: 297mm;
            padding: 3cm 2cm 2cm 3cm; margin: 0 auto; box-sizing: border-box;
            font-family: "Arial", sans-serif; font-size: 12pt; line-height: 1.5; text-align: justify; color: black;
        }
        .p-abnt { text-indent: 1.25cm; margin-bottom: 15px; }
        .assinatura-box { margin-top: 60px; text-align: center; }
        .linha { border-top: 1px solid #000; width: 70%; margin: 50px auto 5px; }

        @media print {
            .no-print { display: none; }
            #areaImpressao { display: block !important; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print app-container">
    <div class="header"><h1>CONTAÊ PROFE</h1></div>
    <div class="grid-inputs">
        <div class="campo"><label>Criança</label><input type="text" id="nome"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola"></div>
        <div class="campo"><label>Cidade</label><input type="text" id="cidade"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Semestre</label><select id="semestre"><option>1º SEMESTRE</option><option>2º SEMESTRE</option></select></div>
    </div>

    <div class="secao-titulo">DESENVOLVIMENTO & BNCC</div>
    <div id="hab-box"></div>

    <button class="btn-main" style="background: var(--primaria);" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO FLUIDO</button>
    <button class="btn-main" style="background: var(--txt);" onclick="window.print()">🖨️ IMPRIMIR / PDF ABNT</button>
    <p style="font-size: 10px; color: gray; text-align: center;">Responsabilidade técnica e revisão final: Professor Regente.</p>
</div>

<div id="areaImpressao">
    <div id="cabecalhoDoc" style="text-align:center; font-weight:bold; margin-bottom:40px;"></div>
    <div id="corpoDoc"></div>
    <div id="dataDoc" style="text-align:right; margin-top:40px;"></div>
    <div class="assinatura-box">
        <div class="linha"></div>GESTOR(A) ESCOLAR
        <div class="linha"></div>PROFESSOR(A) REGENTE
        <div class="linha"></div>RESPONSÁVEL
    </div>
</div>

<script>
    const habs = ["Coordenação Motora", "Linguagem Oral", "Socioafetivo", "Desenvolvimento Cognitivo", "Convívio Social"];
    let escolhas = {};

    function init() {
        const box = document.getElementById('hab-box');
        habs.forEach(h => {
            const div = document.createElement('div');
            div.className = 'card-hab';
            div.innerHTML = `<strong>${h}</strong><div class="btn-group">
                <button class="btn-opt" onclick="sel('${h}','av',this)">Avançado</button>
                <button class="btn-opt" onclick="sel('${h}','int',this)">Intermediário</button>
                <button class="btn-opt" onclick="sel('${h}','ini',this)">Inicial</button>
            </div>`;
            box.appendChild(div);
        });
    }

    function sel(h, n, b) {
        Array.from(b.parentElement.children).forEach(btn => btn.className = 'btn-opt');
        if(n==='av') b.classList.add('active-azul');
        if(n==='int') b.classList.add('active-verde');
        if(n==='ini') b.classList.add('active-amarelo');
        escolhas[h] = n;
    }

    function gerarRelatorio() {
        const nomeAl = document.getElementById('nome').value || "A CRIANÇA";
        const pNome = nomeAl.split(' ')[0];
        const art = (pNome.endsWith('A') || pNome.endsWith('S')) ? 'a' : 'o';
        const discente = art === 'a' ? 'aluna' : 'aluno';
        const pron = art === 'a' ? 'ela' : 'ele';

        document.getElementById('cabecalhoDoc').innerHTML = `${document.getElementById('escola').value.toUpperCase()}<br>RELATÓRIO PEDAGÓGICO - ${document.getElementById('semestre').value}`;
        
        // --- CONSTRUÇÃO DO TEXTO FLUIDO ---
        
        // 1. INTRODUÇÃO
        let texto = `<p class="p-abnt">Durante este período, as vivências pedagógicas de <b>${nomeAl}</b> foram pautadas pelos campos de experiência da BNCC, priorizando o brincar e o interagir como eixos estruturantes. Observou-se que ${art} ${discente} apresentou um percurso repleto de descobertas, integrando-se com segurança às propostas cotidianas da nossa instituição.</p>`;

        // 2. DESENVOLVIMENTO (Agrupando habilidades)
        let motor = escolhas["Coordenação Motora"] === 'av' ? "plena autonomia em seus movimentos" : "avanços graduais em sua percepção corporal";
        let social = escolhas["Socioafetivo"] === 'av' ? "estabelece vínculos afetivos fortes e saudáveis" : "busca a mediação docente para resolver pequenos conflitos";
        let cog = escolhas["Desenvolvimento Cognitivo"] === 'av' ? "manifesta curiosidade e raciocínio lógico aguçado" : "encontra-se em fase de exploração de novos conceitos";

        texto += `<p class="p-abnt">No que tange ao desenvolvimento motor e socioafetivo, ${pNome} demonstra ${motor}. Aliado a isso, nota-se que ${art} criança ${social}, revelando um amadurecimento constante em sua forma de perceber o outro. Quanto aos aspectos cognitivos e de linguagem, ${pNome} ${cog}, participando ativamente das rodas de conversa e expressando seus desejos e ideias de maneira cada vez mais clara e afetiva.</p>`;

        // 3. CONCLUSÃO
        texto += `<p class="p-abnt">Diante das evidências observadas, conclui-se que o desenvolvimento de ${pNome} segue em ritmo promissor, consolidando habilidades essenciais para seu protagonismo. Para o próximo ciclo, projetamos a continuidade de uma parceria estreita entre escola e família, fundamental para fortalecer as conquistas já alcançadas por est${art} pequen${art}.</p>`;

        document.getElementById('corpoDoc').innerHTML = texto;
        document.getElementById('dataDoc').innerText = `${document.getElementById('cidade').value.toUpperCase()}, ${new Date().toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'})}`;
        document.getElementById('areaImpressao').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
        alert("Contaê Profe: Relatório gerado com sucesso!");
    }

    init();
</script>
</body>
</html>
