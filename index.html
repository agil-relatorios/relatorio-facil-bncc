<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre Pro - Inteligência Pedagógica</title>
    <style>
        :root { --azul: #2980b9; --verde: #27ae60; --amarelo: #f1c40f; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 10px; }
        .no-print { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--azul); border-bottom: 4px solid var(--amarelo); padding-bottom: 10px; }
        .grid-topo { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        
        .secao { background: #f1f7ff; padding: 12px; border-radius: 8px; margin: 20px 0 10px; font-weight: bold; border-left: 5px solid var(--azul); }
        
        /* Sistema de Botões de Estágio */
        .card-habilidade { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        .btn-opt { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background: #fff; font-size: 12px; font-weight: 600; transition: 0.3s; }
        
        .avancado.active { background: var(--azul) !important; color: white; border-color: #1a5276; }
        .intermediario.active { background: var(--verde) !important; color: white; border-color: #1e8449; }
        .inicial.active { background: var(--amarelo) !important; color: #000; border-color: #d4ac0d; }

        .btn-acao { width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-texto { background: #8e44ad; }
        .btn-frase { background: var(--azul); }

        /* PADRÃO ABNT */
        #folhaA4 { 
            display: none; background: white; width: 210mm; min-height: 297mm; 
            padding: 3cm 2cm 2cm 3cm; margin: 20px auto;
            font-family: "Arial", sans-serif; font-size: 12pt; line-height: 1.5; 
            text-align: justify; box-sizing: border-box;
        }
        .paragrafo { text-indent: 1.25cm; margin-bottom: 15px; }
        .assinaturas { margin-top: 80px; text-align: center; }
        .assinatura-linha { border-top: 1px solid #000; width: 80%; margin: 60px auto 5px; }
        .assinatura-nome { font-size: 10pt; font-weight: bold; margin-bottom: 40px; }

        @media print {
            .no-print { display: none; }
            #folhaA4 { display: block !important; box-shadow: none; margin: 0; width: 100%; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <button style="background:var(--dark); color:white; border:none; padding:12px; border-radius:8px; width:100%; cursor:pointer; font-weight:bold; margin-bottom:15px;" onclick="abrirManual()">📖 MANUAL DE USO & TERMOS</button>
    <h1>EducaNobre Pro 🍎</h1>

    <div class="grid-topo">
        <div><label>Nome do Aluno(a):</label><input type="text" id="nome" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Professor(a):</label><input type="text" id="prof" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Escola:</label><input type="text" id="escola" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Cidade:</label><input type="text" id="cidade" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Período:</label>
            <select id="semestre">
                <option value="1º SEMESTRE">1º SEMESTRE</option>
                <option value="2º SEMESTRE">2º SEMESTRE</option>
            </select>
        </div>
        <div><label>Faixa Etária:</label>
            <select id="faixa">
                <option value="bebês">Bebês (0 a 1a 6m)</option>
                <option value="bem-pequenas">Crianças Bem Pequenas (1a 7m a 3a 11m)</option>
                <option value="pequenas">Crianças Pequenas (4a a 5a 11m)</option>
            </select>
        </div>
    </div>

    <div class="secao">HABILIDADES BNCC (CLIQUE NO NÍVEL)</div>
    <div id="hab-box"></div>

    <div class="secao">INTENCIONALIDADE & ROTINA</div>
    <div id="rotina-box"></div>

    <div class="secao">CATEGORIAS DE ATIVIDADES</div>
    <div id="ativ-box"></div>

    <button class="btn-acao btn-frase" onclick="gerar('FRASE')">GERAR POR FRASES</button>
    <button class="btn-acao btn-texto" onclick="gerar('TEXTO')">GERAR RELATÓRIO TEXTUAL (ABNT)</button>
    <button onclick="window.print()" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px; margin-top:10px; cursor:pointer; font-weight:bold;">🖨️ IMPRIMIR / GERAR PDF</button>
</div>

<div id="folhaA4">
    <div id="header-doc" style="text-align:center; font-weight:bold; margin-bottom:40px;"></div>
    <div id="texto-doc"></div>
    <div id="footer-doc" style="text-align:right; margin-top:40px;"></div>
    
    <div class="assinaturas">
        <div class="assinatura-linha"></div><div class="assinatura-nome">GESTOR(A)</div>
        <div class="assinatura-linha"></div><div class="assinatura-nome">PROFESSOR(A)</div>
        <div class="assinatura-linha"></div><div class="assinatura-nome">RESPONSÁVEL</div>
    </div>
</div>

<script>
    const habs = ["Coordenação Motora Ampla", "Coordenação Motora Fina", "Linguagem Oral", "Nome Próprio", "Aprendizagem", "Socioafetivo", "Participação", "Desenvolvimento Cognitivo", "Convívio Social"];
    const rotinas = ["Acolhimento e despedida", "Atividade de livre escolha", "Momentos de grande grupo", "Momentos de pequenos grupos", "Área externa", "Rotina de cuidados"];
    const ativs = ["Pintura e Colagem", "Modelagem", "Música e Ritmo", "Contação de Histórias", "Jogos de Associação", "Desafios Lógicos", "Circuitos Motores", "Brincadeiras Clássicas", "Atividades ao Ar Livre"];
    
    let dbSelecao = {};

    function init() {
        const hBox = document.getElementById('hab-box');
        const rBox = document.getElementById('rotina-box');
        const aBox = document.getElementById('ativ-box');

        const criarCards = (lista, container) => {
            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card-habilidade';
                div.innerHTML = `<strong>${item}</strong>
                    <div class="btn-group">
                        <button class="btn-opt" onclick="setNivel('${item}','avancado',this)">Avançado</button>
                        <button class="btn-opt" onclick="setNivel('${item}','intermediario',this)">Intermediário</button>
                        <button class="btn-opt" onclick="setNivel('${item}','inicial',this)">Inicial</button>
                    </div>`;
                container.appendChild(div);
            });
        };

        criarCards(habs, hBox);
        criarCards(rotinas, rBox);
        criarCards(ativs, aBox);
    }

    function setNivel(item, nivel, btn) {
        Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active', 'avancado', 'intermediario', 'inicial'));
        btn.classList.add('active', nivel);
        dbSelecao[item] = nivel;
    }

    function sortear(nivel, sujeito, campo) {
        const conectores = ["Além disso, ", "Somado a isso, ", "No que se refere a(o) ", "Vale ressaltar que ", "Nesse sentido, "];
        const bancos = {
            avancado: ["demonstra protagonismo e segurança em suas ações.", "apresenta evolução clara e autonomia nas propostas.", "manifesta criatividade ao enfrentar novos desafios."],
            intermediario: ["apresenta amadurecimento constante e participativo.", "demonstra avanços significativos com mediação pontual.", "evolui gradualmente em suas descobertas diárias."],
            inicial: ["encontra-se em fase de descoberta com suporte pedagógico.", "demonstra necessidade de mediação para consolidar habilidades.", "participa ativamente sob orientação constante da professora."]
        };
        const con = conectores[Math.floor(Math.random()*conectores.length)];
        const texto = bancos[nivel][Math.floor(Math.random()*bancos[nivel].length)];
        return `${con}${sujeito} em relação a(o) ${campo.toLowerCase()}, ${texto}`;
    }

    function gerar(tipo) {
        const nomeCompleto = document.getElementById('nome').value || "A CRIANÇA";
        const primeiroNome = nomeCompleto.split(' ')[0];
        const escola = document.getElementById('escola').value;
        const cidade = document.getElementById('cidade').value;
        const semestre = document.getElementById('semestre').value;
        const dataH = new Date().toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'});

        document.getElementById('header-doc').innerHTML = `${escola}<br>RELATÓRIO PEDAGÓGICO - ${semestre}`;
        document.getElementById('footer-doc').innerHTML = `${cidade}, ${dataH}`;
        
        let conteudo = "";
        
        if(tipo === 'TEXTO') {
            // INTRODUÇÃO
            conteudo += `<p class="paragrafo">Durante este período, as vivências pedagógicas de <b>${nomeCompleto}</b> foram fundamentadas nos direitos de aprendizagem da BNCC. Seu desenvolvimento foi observado atentamente tanto em momentos de rotina quanto em dinâmicas coletivas e individuais.</p>`;
            
            // DESENVOLVIMENTO INTEGRADO
            let frasesHab = Object.keys(dbSelecao).filter(k => habs.includes(k));
            conteudo += `<p class="paragrafo">O(A) aluno(a) tem demonstrado um percurso rico em descobertas. `;
            frasesHab.forEach((h, i) => {
                let s = i === 0 ? primeiroNome : (i % 2 === 0 ? "a criança" : "ele(a)");
                conteudo += sortear(dbSelecao[h], s, h) + " ";
            });
            conteudo += `</p>`;

            // ATIVIDADES
            conteudo += `<p class="paragrafo">No que tange às práticas de sala, destacamos a participação em atividades de expressão e movimento, onde o protagonismo infantil foi a base para a consolidação de novas aprendizagens.</p>`;

            // CONCLUSÃO
            conteudo += `<p class="paragrafo">Diante das observações, conclui-se que ${primeiroNome} segue em pleno desenvolvimento. Para o próximo ciclo, projeta-se a continuidade da estreita parceria entre escola e família, fundamental para potencializar seu crescimento integral.</p>`;
        } else {
            Object.keys(dbSelecao).forEach(h => {
                conteudo += `<p class="paragrafo"><b>${h.toUpperCase()}:</b> ${sortear(dbSelecao[h], "A criança", h)}</p>`;
            });
        }

        document.getElementById('texto-doc').innerHTML = conteudo;
        document.getElementById('folhaA4').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function abrirManual() {
        alert("MANUAL EDUCANOBRE:\n1. Nomes em CAIXA ALTA são automáticos.\n2. Todos os botões (Habilidades, Rotina e Atividade) agora possuem os 3 níveis.\n3. O relatório ABNT agrupa as falas para não parecer uma lista.\n4. O nome da criança aparece em destaque apenas uma vez no texto.");
    }

    init();
</script>
</body>
</html>
