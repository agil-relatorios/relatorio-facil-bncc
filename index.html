<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre - Gerador de Relatórios</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; background-color: #27ae60; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #219150; }
        #resultado { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; display: none; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ EducaNobre</h1>
    <p style="text-align:center">Relatórios com Linguagem Nobre e BNCC</p>

    <label>Nome do Aluno:</label>
    <input type="text" id="nome" placeholder="Ex: João Silva">

    <label>Campo de Experiência (BNCC):</label>
    <select id="campo">
        <option value="socio">O eu, o outro e o nós</option>
        <option value="corpo">Corpo, gestos e movimentos</option>
    </select>

    <label>Observação do Professor:</label>
    <select id="obs">
        <option value="otimo">Participa bem das interações</option>
        <option value="desenv">Está começando a interagir</option>
        <option value="apoio">Necessita de mediação constante</option>
    </select>

    <button onclick="gerarRelatorio()">Gerar Relatório Nobre ✍️</button>

    <div id="resultado"></div>
</div>

<script>
function gerarRelatorio() {
    const nome = document.getElementById('nome').value || "O(A) discente";
    const campo = document.getElementById('campo').value;
    const obs = document.getElementById('obs').value;
    let texto = "";

    if(campo === "socio") {
        if(obs === "otimo") texto = `${nome} demonstra empatia nas interações interpares, estabelecendo relações de reciprocidade e respeitando as normas de convivência em situações de cooperação, conforme preconiza a BNCC.`;
        if(obs === "desenv") texto = `${nome} encontra-se em processo de maturação nas relações sociais, demonstrando avanços graduais na interação com seus pares e na compreensão das normas de convivência coletiva.`;
        if(obs === "apoio") texto = `${nome} demanda mediação constante do educador para organizar suas interações, necessitando de suporte para fortalecer seu senso de alteridade e pertencimento ao grupo.`;
    }
    
    // Mostra o resultado
    const divResult = document.getElementById('resultado');
    divResult.style.display = 'block';
    divResult.innerText = texto;
}
</script>

</body>
</html>
