<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTAÊ PROFE - Versão Final Consolidada</title>
    <style>
        :root { 
            --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542;
            --cor-inicial: #e74c3c; --cor-processo: #f1c40f; --cor-avancado: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 25px; text-align: center; }
        .logo { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .logo span { color: #ffeaa7; }

        .container { max-width: 900px; width: 92%; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; display: block; }
        input, select, textarea { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        
        .secao-pergunta { background: var(--azul); color: white; padding: 12px 15px; border-radius: 12px; margin: 25px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .pergunta-texto { font-size: 0.85rem; font-weight: bold; margin: 0; }

        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-v { padding: 15px 5px; border: 2px solid #edeff2; border-radius: 12px; cursor: pointer; font-size: 0.65rem; font-weight: bold; text-align: center; background: white; color: #747d8c; }
        .btn-v.active { color: white; border-color: transparent; }
        .btn-v.ini.active { background: var(--cor-inicial); }
        .btn-v.pro.active { background: var(--cor-processo); }
        .btn-v.ava.active { background: var(--cor-avancado); }

        .btn-main { width: 100%; padding: 20px; background: var(--primaria); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* CONFIGURAÇÃO DA FOLHA A4 */
        #editor { 
            width: 210mm; min-height: 297mm; margin: 40px auto; background: white; 
            padding: 30mm 20mm 20mm 25mm; /* Margem Esquerda de 2,5cm e Superior de 3cm */
            box-shadow: 0 0 20px rgba(0,0,0,0.1); display: none; color: #000; line-height: 1.6; 
        }
        .esc-nome { font-weight: bold; text-align: center; margin-bottom: 20px; text-transform: uppercase; font-size: 14pt; }
        .dados-aluno { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 25px; text-transform: uppercase; font-size: 11pt; line-height: 1.4; }
        .tit-rel { text-align: center; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-size: 12pt; }
        .paragrafo { text-align: justify; text-indent: 1.5cm; margin-bottom: 15px; font-size: 12pt; }
        .msg-docente { font-style: italic; text-align: center; margin-top: 30px; font-size: 11pt; border-top: 1px solid #eee; padding-top: 10px; }
        .assinaturas { margin-top: 50px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .bloco-ass { border-top: 1px solid #000; text-align: center; font-size: 10pt; padding-top: 5px; text-transform: uppercase; }
        .ass-full { grid-column: span 2; margin: 30px auto 0; width: 60%; }

        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            #editor { display: block !important; box-shadow: none; margin: 0; width: 100% !important; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <h1 class="logo">CONTAÊ <span>PROFE</span></h1>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" value="Rio de Janeiro"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Criança (Nome Completo)</label><input type="text" id="crianca"></div>
        <div class="campo"><label>Fase</label>
            <select id="fase">
                <option>1º PERÍODO</option>
                <option>2º PERÍODO</option>
            </select>
        </div>
        <div class="campo"><label>Turma</label><input type="text" id="turma"></div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option>1º BIMESTRE</option><option>2º BIMESTRE</option>
                <option>3º BIMESTRE</option><option>4º BIMESTRE</option>
                <option>1º SEMESTRE</option><option>2º SEMESTRE</option>
            </select>
        </div>
    </div>

    <div id="campos-bncc"></div>

    <div class="campo" style="margin-top:15px;">
        <label>Mensagem Especial da Professora</label>
        <textarea id="msg_prof" rows="2" placeholder="Ex: 'Educar é um ato de amor...'"></textarea>
    </div>

    <button onclick="gerar()" class="btn-main no-print" style="margin-top:20px;">📝 GERAR RELATÓRIO PROFISSIONAL</button>
</div>

<div id="editor" contenteditable="true"></div>

<script>
    const db = [
        { t: "O Eu, o Outro e o Nós", conect: "Quanto às relações socioafetivas, ", frases: { ini: "está em fase de adaptação social, buscando segurança nas figuras de referência.", pro: "interage com entusiasmo, respeitando as normas e partilhando vivências.", ava: "demonstra liderança e profunda empatia, mediando conflitos com autonomia." } },
        { t: "Corpo, Gestos e Movimentos", conect: "No campo da psicomotricidade, ", frases: { ini: "necessita de estímulos para explorar novos desafios físicos e espaciais.", pro: "demonstra agilidade e bom controle motor em atividades de ritmo.", ava: "possui amplo domínio corporal e expressividade em seus movimentos." } },
        { t: "Traços, Sons, Cores e Formas", conect: "Em relação à expressão artística, ", frases: { ini: "demonstra curiosidade sensorial ao manipular diferentes materiais.", pro: "cria produções ricas em detalhes, explorando cores e texturas.", ava: "manifesta sensibilidade artística singular em suas criações espontâneas." } },
        { t: "Escuta, Fala, Pensamento e Imaginação", conect: "No desenvolvimento da linguagem, ", frases: { ini: "expressa suas necessidades básicas enquanto amplia seu repertório verbal.", pro: "participa ativamente de diálogos, relatando fatos com coerência.", ava: "argumenta com clareza e demonstra forte interesse pelo mundo letrado." } },
        { t: "Espaço, Tempo, Quantidades e Relações", conect: "Sobre o raciocínio lógico, ", frases: { ini: "começa a identificar relações de tempo e espaço no cotidiano.", pro: "relaciona quantidades e sequências lógicas de forma assertiva.", ava: "resolve desafios matemáticos com raciocínio rápido e independente." } }
    ];

    function iniciar() {
        const cont = document.getElementById('campos-bncc');
        db.forEach((item, i) => {
            cont.innerHTML += `
                <div class="secao-pergunta"><p class="pergunta-texto">${item.t.toUpperCase()}</p></div>
                <div class="grid-botoes" id="g-${i}">
                    <div class="btn-v ini" onclick="marcar(${i}, 'ini')">MEDIAÇÃO</div>
                    <div class="btn-v pro" onclick="marcar(${i}, 'pro')">PROCESSO</div>
                    <div class="btn-v ava" onclick="marcar(${i}, 'ava')">AUTONOMIA</div>
                </div>`;
        });
    }

    function marcar(gi, niv) {
        const btns = document.getElementById(`g-${gi}`).querySelectorAll('.btn-v');
        btns.forEach(b => b.classList.remove('active'));
        document.querySelector(`#g-${gi} .${niv}`).classList.add('active');
    }

    function formatarCidade(c) {
        const ex = ["da", "de", "do", "das", "dos", "e"];
        return c.toLowerCase().split(' ').map(w => ex.includes(w) ? w : w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function gerar() {
        const nomeCompleto = document.getElementById('crianca').value.toUpperCase() || "O ALUNO";
        const primeiroNome = nomeCompleto.split(' ')[0];
        const cidade = formatarCidade(document.getElementById('cidade').value);
        const data = new Date().toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'});

        let textoCorpo = "";
        db.forEach((item, i) => {
            const btn = document.querySelector(`#g-${i} .active`);
            if (btn) {
                const nivel = btn.classList.contains('ini') ? 'ini' : (btn.classList.contains('pro') ? 'pro' : 'ava');
                textoCorpo += `${item.conect} <b>${primeiroNome}</b> ${item.frases[nivel]} `;
            }
        });

        document.getElementById('editor').innerHTML = `
            <div class="esc-nome">ESCOLA: ${document.getElementById('escola').value.toUpperCase()}</div>
            <div class="dados-aluno">
                <b>DOCENTE:</b> ${document.getElementById('prof').value.toUpperCase()}<br>
                <b>ALUNO(A):</b> ${nomeCompleto}<br>
                <b>FASE:</b> ${document.getElementById('fase').value} | <b>TURMA:</b> ${document.getElementById('turma').value.toUpperCase()}
            </div>
            <div class="tit-rel">PARECER DESCRITIVO - ${document.getElementById('periodo').value}</div>
            
            <div class="paragrafo">Pautados nos direitos de aprendizagem previstos pela BNCC, apresentamos o registro do percurso educativo de <b>${nomeCompleto}</b>. Durante este ciclo, observamos que a criança vivenciou experiências fundamentais para sua formação integral, demonstrando engajamento e curiosidade.</div>
            
            <div class="paragrafo">${textoCorpo}</div>
            
            <div class="paragrafo">Considerando os avanços alcançados, encerramos este período celebrando as conquistas de <b>${primeiroNome}</b>. Reafirmamos que a parceria entre família e escola é o alicerce para que novos desafios sejam superados com sucesso.</div>
            
            ${document.getElementById('msg_prof').value ? `<div class="msg-docente">"${document.getElementById('msg_prof').value}"</div>` : ''}

            <div style="text-align:center; margin-top:40px; font-weight:bold;">${cidade}, ${data}</div>
            
            <div class="assinaturas">
                <div class="bloco-ass">Assinatura do Docente</div>
                <div class="bloco-ass">Coordenação Pedagógica</div>
                <div class="bloco-ass ass-full">Assinatura do Responsável</div>
            </div>
        `;
        document.getElementById('editor').style.display = 'block';
        window.print();
    }
    iniciar();
</script>
</body>
</html>
