<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - Gerador de Parecer</title>
    <style>
        :root {
            --primaria: #ff4757; --secundaria: #2ed573; --terciaria: #1e90ff;
            --alerta: #ffa502; --bg: #f1f2f6; --texto: #2f3542; --branco: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: var(--branco); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primaria); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--primaria); font-size: 1.8rem; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .campo { display: flex; flex-direction: column; }
        .campo.full { grid-column: span 2; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; color: #57606f; }
        input, select { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; font-size: 0.9rem; outline: none; }

        .secao-titulo { background: #2f3542; color: white; padding: 8px 12px; border-radius: 6px; margin: 20px 0 10px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        
        .palavras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
        .btn-palavra { 
            padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: white; 
            cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.2s;
        }
        
        /* Cores das Seleções */
        .btn-palavra.avancado.selected { background: var(--terciaria) !important; color: white; border-color: var(--terciaria); }
        .btn-palavra.processo.selected { background: var(--secundaria) !important; color: white; border-color: var(--secundaria); }
        .btn-palavra.inicial.selected { background: var(--alerta) !important; color: white; border-color: var(--alerta); }

        .btn-gerar { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; margin-top: 25px; background: var(--primaria); box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }
        
        #resultado-secao { display: none; margin-top: 30px; }
        #editor { width: 100%; min-height: 400px; padding: 30px; border: 1px solid #ccc; font-family: Arial; font-size: 12pt; line-height: 1.5; text-align: justify; background: white; box-sizing: border-box; outline: none; }
        
        .acoes-finais { display: flex; gap: 8px; margin-top: 15px; }
        .btn-acao { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        @media print { .no-print { display: none !important; } .container { box-shadow: none; width: 100%; padding: 0; } #editor { border: none; padding: 0; } }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <h1>CONTAÊ PROFE</h1>
    </div>

    <div class="grid-inputs">
        <div class="campo full"><label>Nome da Criança</label><input type="text" id="nome_crianca" placeholder="NOME COMPLETO"></div>
        <div class="campo">
            <label>Gênero</label>
            <select id="genero">
                <option value="a">Menina (A)</option>
                <option value="o">Menino (O)</option>
            </select>
        </div>
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" value="Manaus"></div>
        <div class="campo full"><label>Escola</label><input type="text" id="escola"></div>
    </div>

    <div class="secao-titulo">Perfil e Atitudes Sociais</div>
    <div id="grid-perfil" class="palavras-grid"></div>

    <div id="campos-bncc"></div>

    <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO FINAL</button>
</div>

<div id="resultado-secao" class="container">
    <div id="editor" contenteditable="true"></div>
    <div class="acoes-finais no-print">
        <button class="btn-acao" style="background: var(--terciaria);" onclick="window.print()">🖨️ IMPRIMIR / PDF</button>
        <button class="btn-acao" style="background: var(--texto);" onclick="location.reload()">🧹 NOVO</button>
    </div>
</div>

<script>
    const selecoes = { perfil: {}, bncc: {} };
    
    const dados = {
        perfil: {
            avancado: ['Calma', 'Prestativa', 'Autônoma', 'Líder', 'Comunicativa', 'Criativa'],
            processo: ['Observadora', 'Participativa', 'Reservada', 'Curiosa', 'Agitada'],
            inicial: ['Introvertida', 'Insegura', 'Desatenta', 'Resistente', 'Impulsiva']
        },
        bncc: {
            'O Eu, o Outro e o Nós': {
                avancado: ['Lidera', 'Colabora', 'Empatiza'],
                processo: ['Interage', 'Integra-se', 'Participa'],
                inicial: ['Isola-se', 'Necessita apoio', 'Recusa']
            },
            'Corpo, Gestos e Movimentos': {
                avancado: ['Domina movimentos', 'Coordena bem', 'Equilibrada'],
                processo: ['Desenvolve motor', 'Experimenta', 'Tenta'],
                inicial: ['Limita-se', 'Dificuldade motora', 'Repete']
            },
            'Traços, Sons, Cores e Formas': {
                avancado: ['Cria arte', 'Inova', 'Distingue sons'],
                processo: ['Explora cores', 'Pinta', 'Desenha'],
                inicial: ['Rabisca', 'Sente texturas', 'Observa']
            },
            'Escuta, Fala, Pensamento e Imaginação': {
                avancado: ['Argumenta', 'Narra histórias', 'Comunica'],
                processo: ['Expressa fala', 'Escuta', 'Nomeia'],
                inicial: ['Aponta', 'Emite sons', 'Imita']
            },
            'Espaço, Tempo, Quantidades': {
                avancado: ['Compara', 'Classifica', 'Resolve'],
                processo: ['Identifica', 'Conta', 'Percebe'],
                inicial: ['Olha', 'Toca', 'Empilha']
            }
        }
    };

    function iniciar() {
        const gridP = document.getElementById('grid-perfil');
        for (let nivel in dados.perfil) {
            dados.perfil[nivel].forEach(p => {
                const btn = document.createElement('button');
                btn.className = `btn-palavra ${nivel}`;
                btn.innerText = p;
                btn.onclick = () => {
                    btn.classList.toggle('selected');
                    if(selecoes.perfil[p]) delete selecoes.perfil[p]; 
                    else selecoes.perfil[p] = nivel;
                };
                gridP.appendChild(btn);
            });
        }

        const containerB = document.getElementById('campos-bncc');
        for (let campo in dados.bncc) {
            const div = document.createElement('div');
            div.innerHTML = `<div class="secao-titulo">${campo}</div><div class="palavras-grid" id="bncc-${campo}"></div>`;
            containerB.appendChild(div);
            const grid = div.querySelector('.palavras-grid');
            
            for (let nivel in dados.bncc[campo]) {
                dados.bncc[campo][nivel].forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = `btn-palavra ${nivel}`;
                    btn.innerText = p;
                    btn.onclick = () => {
                        grid.querySelectorAll('.btn-palavra').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selecoes.bncc[campo] = { palavra: p, nivel: nivel };
                    };
                    grid.appendChild(btn);
                });
            }
        }
    }

    function gerarRelatorio() {
        const nome = document.getElementById('nome_crianca').value.toUpperCase() || "A CRIANÇA";
        const escola = document.getElementById('escola').value.toUpperCase() || "ESCOLA";
        const genero = document.getElementById('genero').value;
        const cidade = document.getElementById('cidade').value.toUpperCase();
        const dataH = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
        
        const art = genero === 'a' ? 'A aluna' : 'O aluno';
        const pNome = nome.split(' ')[0];

        let rel = `<div style="text-align:center; font-weight:bold; text-decoration:underline;">RELATÓRIO DESCRITIVO INDIVIDUAL</div><br>`;
        rel += `<p>Durante este período, as vivências de <b>${nome}</b> na unidade <b>${escola}</b> focaram nos direitos de aprendizagem.</p>`;
        
        const perfis = Object.keys(selecoes.perfil);
        if(perfis.length > 0) {
            rel += `<p>${pNome} demonstra ser uma criança ${perfis.join(', ').toLowerCase()}, interagindo de forma afetiva com o grupo.</p>`;
        }

        for (let campo in selecoes.bncc) {
            const s = selecoes.bncc[campo];
            let frase = "";
            if(s.nivel === 'avancado') frase = `destaca-se plenamente ao ${s.palavra.toLowerCase()}.`;
            else if(s.nivel === 'processo') frase = `está em fase de desenvolvimento ao ${s.palavra.toLowerCase()}.`;
            else frase = `necessita de mediação constante para ${s.palavra.toLowerCase()}.`;
            
            rel += `<p><b>${campo}:</b> ${art} ${frase}</p>`;
        }

        rel += `<p>Concluímos que ${pNome} segue em pleno desenvolvimento cognitivo e social.</p>`;
        rel += `<br><div style="text-align:right;">${cidade}, ${dataH}.</div><br><br>`;
        rel += `<center>________________________________<br>Professor(a)</center>`;

        document.getElementById('editor').innerHTML = rel;
        document.getElementById('resultado-secao').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = iniciar;
</script>
</body>
</html>
