<script>
    const camposBNCC = [
        {
            n: "1. O EU, O OUTRO E O NÓS", 
            p: "Vínculos, Identidade e Alteridade",
            info: "<strong>O que observar:</strong> A criança interage com pares e adultos? Respeita regras de convivência? Manifesta empatia e reconhece suas características físicas e preferências?"
        },
        {
            n: "2. CORPO, GESTOS E MOVIMENTOS", 
            p: "Expressividade e Coordenação",
            info: "<strong>O que observar:</strong> Explora o espaço com segurança? Domina a coordenação motora fina (desenho/recorte) e ampla (correr/pular)? Reconhece sensações e limites do corpo?"
        },
        {
            n: "3. TRAÇOS, SONS, CORES E FORMAS", 
            p: "Sensorialidade e Criação Artística",
            info: "<strong>O que observar:</strong> Participa de produções musicais e teatrais? Expressa-se através de diferentes suportes (argila, tinta, colagem)? Reconhece cores e formas no ambiente?"
        },
        {
            n: "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", 
            p: "Linguagem e Oralidade",
            info: "<strong>O que observar:</strong> Expressa ideias e sentimentos com clareza? Demonstra interesse pela leitura? Participa de relatos e reconto de histórias? Conhece gêneros textuais?"
        },
        {
            n: "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES", 
            p: "Mundo Físico e Raciocínio Lógico",
            info: "<strong>O que observar:</strong> Relaciona números às quantidades? Identifica relações temporais (ontem/hoje)? Demonstra curiosidade sobre fenômenos naturais e sociais?"
        }
    ];

    // NOVO BANCO DE DADOS: RELATÓRIOS ESTRUTURADOS POR PERFIL (DNA PEDAGÓGICO)
    const BANCO_DNA = {
        vermelho: [
            "Durante este período, observamos que o percurso de [NOME] foi marcado pela necessidade de uma mediação constante e afetuosa para o estabelecimento de vínculos. No campo 'O Eu, o Outro e o Nós', a criança demonstrou estar em fase de apropriação das rotinas, exigindo suporte para interagir e expressar necessidades. Pautamos nossa prática no direito de 'Conviver', respeitando seu tempo singular de adaptação e oferecendo contextos que convidam à exploração segura do ambiente escolar sob olhar atento da docente.",
            "O desenvolvimento de [NOME] revelou a importância de intervenções personalizadas e estimulação contínua. Em conformidade com a BNCC, priorizamos vivências que assegurem o direito de 'Explorar', visto que a criança apresenta-se em processo inicial de coordenação ampla e fina. O foco pedagógico tem sido o acolhimento, garantindo que as barreiras de comunicação sejam superadas através de linguagens lúdicas, celebrando cada pequeno avanço na conquista de sua identidade e autonomia mediada."
        ],
        misto: [
            "Neste período, [NOME] apresentou um desenvolvimento dinâmico, revelando protagonismo em áreas de interesse e necessidade de mediação em desafios específicos. No campo 'Traços, Sons, Cores e Formas', demonstra criatividade e independência, exercendo seu direito de 'Expressar'. Em contrapartida, nas relações que envolvem regras coletivas, o processo de autorregulação ainda está em construção. Essa oscilação é vista como um movimento natural de maturação, onde a criança vivencia os direitos de 'Brincar e Participar' com entusiasmo crescente.",
            "[NOME] demonstrou segurança nas interações sociais, exercendo seu direito de 'Conviver' de forma colaborativa. Notamos que sua trajetória é marcada pela curiosidade; enquanto na oralidade e imaginação a criança se expressa com clareza, em desafios lógicos e espaciais demonstra estar em fase de consolidação de saberes (processo). A mediação docente tem sido o trampolim para que [NOME] transforme curiosidade em conhecimento, agindo com resiliência diante de novas descobertas no chão da sala."
        ],
        verde: [
            "Com profundo protagonismo e autonomia, [NOME] percorreu este ciclo consolidando saberes com excelência. No campo 'Escuta, Fala, Pensamento e Imaginação', a criança demonstra domínio comunicativo, formulando hipóteses e ressignificando histórias com facilidade. Seus direitos de 'Brincar, Conhecer-se e Expressar' são exercidos plenamente, atuando como mediadora entre seus pares e demonstrando uma liderança empática. É um percurso brilhante, onde a intencionalidade pedagógica serviu para ampliar horizontes já explorados com segurança.",
            "A trajetória de [NOME] reflete uma apropriação sólida dos objetivos de aprendizagem da BNCC. A criança transita pelos campos de experiência com independência notável, resolvendo situações-problema e demonstrando uma curiosidade científica apurada sobre o mundo físico e social. Sua prontidão cognitiva e emocional permite que ela lidere iniciativas e colabore com o grupo, evidenciando que as vivências lúdicas foram alicerces fundamentais para seu florescimento integral e autônomo."
        ]
    };

    const frasesFinais = ["Seu brilho único ilumina nossa sala.", "Cada descoberta sua é um motivo para sorrir.", "Sua curiosidade é a semente do futuro.", "O mundo fica colorido com sua alegria.", "Continue explorando com esse olhar."];

    let selecoes = {};

    function iniciar() {
        const cCont = document.getElementById('campos-container');
        camposBNCC.forEach((item, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `<div class="secao-pergunta">
                <span class="campo-nome">${item.n}</span>
                <span class="pergunta-texto">${item.p}</span>
                <div class="info-pedagogica">${item.info}</div>
            </div>
            <div class="grid-botoes" id="c-${idx}">
                <div class="btn-v ini" onclick="marcar(${idx}, 'ini', this)">COM MEDIAÇÃO</div>
                <div class="btn-v pro" onclick="marcar(${idx}, 'pro', this)">EM PROCESSO</div>
                <div class="btn-v ava" onclick="marcar(${idx}, 'ava', this)">COM AUTONOMIA</div>
            </div>`;
            cCont.appendChild(div);
        });
    }

    function marcar(idx, n, b) { 
        Array.from(document.getElementById(`c-${idx}`).children).forEach(x => x.classList.remove('active')); 
        b.classList.add('active'); 
        selecoes[idx] = n; 
    }

    function formatarCidade(cidade) {
        const excessoes = ["de", "do", "da", "dos", "das", "e"];
        return cidade.toLowerCase().split(' ').map((palavra, index) => {
            if (index > 0 && excessoes.includes(palavra)) return palavra;
            return palavra.charAt(0).toUpperCase() + palavra.slice(1);
        }).join(' ');
    }

    // NOVA FUNÇÃO: GERA O RELATÓRIO ANALISANDO O PERFIL DE CORES (DNA)
    function gerarRelatorio() {
        const nomeAlu = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const escRaw = document.getElementById('escola').value.trim();
        let esc = escRaw.toUpperCase();
        if (esc !== "" && !esc.startsWith("ESCOLA:")) esc = "ESCOLA: " + esc;

        const cidadeRaw = document.getElementById('cidade').value.trim() || "Sua Cidade";
        const cidadeFormatada = formatarCidade(cidadeRaw);

        // LÓGICA DE DNA: Contagem das cores selecionadas
        const valores = Object.values(selecoes);
        if (valores.length < 5) {
            alert("Por favor, selecione o nível para todos os 5 campos antes de gerar.");
            return;
        }

        const contagem = { ini: 0, pro: 0, ava: 0 };
        valores.forEach(v => contagem[v]++);

        // Identifica qual "Gaveta" do Banco de Dados abrir
        let perfil;
        if (contagem.ini >= 3) perfil = "vermelho";
        else if (contagem.ava >= 4) perfil = "verde";
        else perfil = "misto";

        // Busca o texto pronto e sorteia uma variação para não repetir entre alunos
        const opcoesPerfil = BANCO_DNA[perfil];
        const textoBase = opcoesPerfil[Math.floor(Math.random() * opcoesPerfil.length)];
        
        // Personaliza o texto com o nome do aluno
        const textoFinal = textoBase.replace(/\[NOME\]/g, nomeAlu);
        const fraseMotivacional = frasesFinais[Math.floor(Math.random() * frasesFinais.length)];

        // Renderização para Impressão
        document.getElementById('editor').innerHTML = `
            <div class="esc-nome">${esc || "INSTITUIÇÃO NÃO INFORMADA"}</div>
            <div class="bloco-dados">
                <b>DOCENTE:</b> ${document.getElementById('prof').value.toUpperCase()}<br>
                <b>CRIANÇA:</b> ${nomeAlu}<br>
                <b>FASE:</b> ${document.getElementById('fase').value} | <b>TURMA:</b> ${document.getElementById('turma').value.toUpperCase()}
            </div>
            <div class="tit-parecer">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${document.getElementById('periodo').value}</div>
            <div class="corpo-texto">${textoFinal}</div>
            <div class="msg-final">"${fraseMotivacional}"</div>
            <div class="data-local">${cidadeFormatada}, 19 de abril de 2026.</div>
            
            <div class="assinaturas-duplas">
                <div class="bloco-assinatura">
                    <div class="linha-assinatura"></div>
                    <span class="label-assinatura">Professor(a)</span>
                </div>
                <div class="bloco-assinatura">
                    <div class="linha-assinatura"></div>
                    <span class="label-assinatura">Coordenação / Direção</span>
                </div>
            </div>
            
            <div class="assinatura-unica">
                <div class="linha-assinatura"></div>
                <span class="label-assinatura">Responsável</span>
            </div>
        `;

        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    iniciar();
</script>
