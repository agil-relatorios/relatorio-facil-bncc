<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Contaê Profe','short_name':'Contaê','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#ff4757','icons':[{'src':'https://ui-avatars.com/api/?name=CP&background=ff4757&color=ffeaa7&size=512&rounded=true&font-size=0.4','sizes':'512x512','type':'image/png'}]}">
    <meta name="theme-color" content="#ff4757">

    <style>
        :root { 
            --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; 
            --branco: #ffffff; --cor-inicial: #e74c3c; --cor-processo: #f1c40f; --cor-avancado: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }

        #pwa-banner {
            display: none; background: #2f3542; color: white; padding: 12px;
            position: sticky; top: 0; z-index: 9999; text-align: center; font-size: 0.85rem;
        }
        #pwa-banner button {
            background: var(--cor-avancado); border: none; color: white; padding: 6px 12px;
            border-radius: 5px; font-weight: bold; margin-left: 10px; cursor: pointer;
        }

        header { background: var(--primaria); color: white; padding: 25px; text-align: center; }
        .marca-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .mini-bola-cp { background: #ffeaa7; color: #ff4757; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; }
        .logo { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .logo span { color: #ffeaa7; }
        .slogan { font-size: 0.95rem; font-weight: 300; font-style: italic; opacity: 0.9; margin-top: 5px; }

        .container { max-width: 900px; margin: 30px auto; background: var(--branco); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; color: #57606f; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; outline: none; }
        .upcase { text-transform: uppercase; }
        
        .secao-pergunta { background: var(--azul); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 10px; }
        .titulo-campo { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; opacity: 0.85; letter-spacing: 0.5px; }
        .pergunta-maior { display: block; font-size: 1.1rem; font-weight: 600; margin-top: 4px; line-height: 1.3; }
        
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-v { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: center; background: white; color: #747d8c; font-size: 0.8rem; }
        .btn-v.active { color: white; border-color: transparent; }
        .btn-v.ini.active { background: var(--cor-inicial); }
        .btn-v.pro.active { background: var(--cor-processo); }
        .btn-v.ava.active { background: var(--cor-avancado); }

        .acoes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-gerar { padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: white; background: var(--primaria); cursor: pointer; }
        .btn-limpar { padding: 20px; border: 2px solid #dcdde1; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #747d8c; background: white; }

        #editor { 
            width: 210mm; min-height: 280mm; margin: 20px auto; background: white; 
            padding: 25mm 20mm 15mm 25mm; box-sizing: border-box; font-family: Arial, sans-serif; font-size: 11.5pt; display: none; 
        }
        .corpo-texto { text-align: justify; text-indent: 1.25cm; line-height: 1.8; margin-bottom: 1.2em; }
        .linha-assinatura { border-top: 1px solid #000; width: 65%; margin: 0 auto 5px auto; }
        .bloco-assinatura { margin-top: 1cm; text-align: center; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .assinatura-full { grid-column: 1 / span 2; margin-top: 1cm; }

        @media print { 
            @page { size: A4; margin: 0; }
            .no-print, #pwa-banner { display: none !important; } 
            body { background: white; }
            #editor { display: block !important; margin: 0 !important; border: none !important; width: 100%; } 
        }
    </style>
</head>
<body>

<div id="pwa-banner">
    Baixe o Contaê Profe na sua tela inicial! 
    <button onclick="instalarPWA()">BAIXAR APP</button>
</div>

<header class="no-print">
    <div class="marca-container">
        <div class="mini-bola-cp">CP</div>
        <h1 class="logo">CONTAÊ <span>PROFE</span></h1>
    </div>
    <div class="slogan">"Transformando vivências em registros de excelência."</div>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" placeholder="Ex: Porto de Caldas"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola" class="upcase" placeholder="NOME DA INSTITUIÇÃO"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof" class="upcase"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca" class="upcase"></div>
        <div class="campo"><label>Gênero</label>
            <select id="genero">
                <option value="A CRIANÇA">A CRIANÇA</option>
                <option value="O ALUNO">O ALUNO</option>
                <option value="A ALUNA">A ALUNA</option>
            </select>
        </div>
        <div class="campo"><label>Fase</label><select id="fase"><option>1º PERÍODO</option><option>2º PERÍODO</option></select></div>
        <div class="campo"><label>Turma</label><input type="text" id="turma" class="upcase"></div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option value="1B">1º BIMESTRE</option><option value="2B">2º BIMESTRE</option>
                <option value="3B">3º BIMESTRE</option><option value="4B">4º BIMESTRE</option>
                <option value="1S">1º SEMESTRE</option><option value="2S">2º SEMESTRE</option>
            </select>
        </div>
    </div>
    <div id="campos-container"></div>
    <div class="acoes-container">
        <button class="btn-limpar" onclick="location.reload()">NOVO ALUNO</button>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO</button>
    </div>
</div>

<div id="editor" contenteditable="true"></div>
<div class="no-print" id="btn-print" style="display:none; text-align:center; margin: 20px 0 50px;">
    <button onclick="window.print()" style="padding:15px 60px; background:var(--azul); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR</button>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-banner').style.display = 'block';
    });

    async function instalarPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwa-banner').style.display = 'none';
            deferredPrompt = null;
        }
    }

    const db = {
        introducao: {
            inicio: [
                "Neste estágio inicial da jornada pedagógica, estruturamos o ambiente escolar como um espaço de acolhimento e escuta sensível, pautando nossa prática docente na observação intencional das interações estabelecidas. Através de contextos organizados para promover o brincar e o conviver, focamos no fortalecimento dos vínculos afetivos e na adaptação segura da criança à rotina coletiva. Respeitando a trajetória individual e a curiosidade natural, as propostas foram direcionadas com foco na excelência e no bem-estar emocional, garantindo que o desenvolvimento ocorra de forma plena. Notou-se que ",
                "Ao abrir este ciclo letivo, a intencionalidade pedagógica concentrou-se na criação de territórios de aprendizagem que estimulam o protagonismo e a autonomia desde as primeiras vivências. Mediante uma prática docente pautada no respeito às singularidades e no registro contínuo das descobertas, organizamos situações que convidam à exploração sensorial e social do ambiente. O objetivo central foi assegurar que cada movimento da criança fosse amparado por uma mediação afetuosa e intencional, permitindo uma transição harmoniosa entre o contexto familiar e o escolar. Notou-se que "
            ],
            meio: [
                "Ao longo deste período letivo, consolidamos estratégias que provocam a investigação e o pensamento crítico, transformando a sala de aula em um laboratório de vivências potentes. Respeitando o tempo de maturação de cada saber, as propostas pedagógicas foram delineadas para desafiar as percepções da criança e ampliar seu repertório cultural e social. Através de uma mediação docente constante e planejada, buscamos garantir o direito de participação ativa em todas as etapas da rotina, valorizando a voz e as escolhas autorais que emergem no cotidiano. Percebeu-se que ",
                "Dando continuidade ao percurso formativo, pautamos nossa ação educativa na organização de ambientes que instigam o desejo de conhecer e a resolução colaborativa de problemas. A intencionalidade pedagógica foi direcionada para a ampliação das linguagens e para o fortalecimento da identidade, assegurando que as interações ocorram em um clima de confiança e respeito mútuo. Ao valorizar o registro das trajetórias individuais, focamos na excelência dos processos de aprendizagem, transformando cada descoberta em um degrau sólido para o desenvolvimento integral. Percebeu-se que "
            ],
            fim: [
                "Ao encerrarmos este ciclo de aprendizagens, observamos o amadurecimento significativo dos processos iniciados, refletindo uma prática pedagógica que priorizou o protagonismo e a segurança emocional. A mediação docente, pautada na observação cuidadosa e na escuta das múltiplas linguagens da infância, permitiu que a criança consolidasse saberes essenciais com autonomia e alegria. Nesta fase de síntese, os registros evidenciam uma trajetória rica em significados e descobertas autorais, demonstrando que a base estruturada ao longo do ano preparou o terreno para novos desafios com confiança e curiosidade. Notou-se que ",
                "Nesta fase de transição e consolidação, as propostas pedagógicas foram desenhadas para evidenciar a potência das conquistas alcançadas e a fluidez das relações estabelecidas. A intencionalidade do professor agiu como suporte para que a criança pudesse expressar sua compreensão de mundo com clareza e criatividade, reafirmando sua posição como sujeito social de direitos. Através de um olhar retrospectivo sobre as vivências, celebramos a evolução dos marcos do desenvolvimento integral, garantindo que o fechamento deste período seja pautado na certeza de uma base sólida e afetuosa. Notou-se que "
            ]
        },
        desenvolvimento: {
            ini: ["demonstrou estar em fase de entrosamento com o grupo, explorando materiais de forma individual e buscando a mediação constante para se sentir segura. ", "revelou curiosidade diante das novas propostas, embora ainda sinta necessidade de apoio externo para organizar suas escolhas na rotina. "],
            pro: ["demonstrou um percurso rico em descobertas, participando ativamente de propostas que exigem iniciativa e expressando suas emoções com clareza. ", "encontra-se em pleno processo de amadurecimento de suas habilidades, colaborando com o coletivo e testando hipóteses com autonomia crescente. "],
            ava: ["consolidou saberes fundamentais com protagonismo, liderando investigações e demonstrando uma empatia admirável nas relações interpessoais. ", "revelou um domínio excepcional das competências propostas, agindo com autonomia plena e transformando desafios em produções autorais criativas. "]
        },
        detalhes: [
            "Observamos também um crescente interesse por desafios de raciocínio lógico, testando hipóteses sobre quantidades e espaço de forma prática. ",
            "Nas atividades de corpo e movimento, revelou harmonia motora e uma exploração criativa de diferentes suportes artísticos e texturas. ",
            "Sua relação com a linguagem oral foi ampliada significativamente, demonstrando prazer em recontar histórias e criar novas narrativas. ",
            "Destacou-se o cuidado com o meio ambiente e com a organização dos espaços, revelando uma postura investigativa fundamental.",
            "Demonstrou autonomia exemplar nas rotinas de higiene e alimentação, agindo com independência e zelo pelo seu bem-estar."
        ],
        conclusao: ["O progresso aqui registrado é fruto de uma mediação afetuosa, preparando a criança para novas e fascinantes descobertas em sua jornada acadêmica e pessoal.", "Concluímos este ciclo celebrando as vitórias individuais e reafirmando o compromisso com uma educação de excelência e respeito à infância."]
    };

    let selecoes = {};
    function marcar(idx, n, b) {
        Array.from(document.getElementById(`c-${idx}`).children).forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        selecoes[idx] = n;
    }

    function sortear(l) { return l[Math.floor(Math.random() * l.length)]; }

    function gerarRelatorio() {
        const esc = document.getElementById('escola').value.toUpperCase();
        const nome = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const prof = document.getElementById('prof').value.toUpperCase();
        const cidadeRaw = document.getElementById('cidade').value || "Manaus";
        const cidade = cidadeRaw.charAt(0).toUpperCase() + cidadeRaw.slice(1).toLowerCase();
        const pCod = document.getElementById('periodo').value;
        const pTexto = document.querySelector("#periodo option:checked").text;
        
        let intro;
        if(pCod === "1B" || pCod === "1S") intro = sortear(db.introducao.inicio);
        else if(pCod === "2B" || pCod === "3B") intro = sortear(db.introducao.meio);
        else intro = sortear(db.introducao.fim);

        const vals = Object.values(selecoes);
        const dominante = vals.length > 0 ? vals.sort((a,b) => vals.filter(v => v===a).length - vals.filter(v => v===b).length).pop() : 'pro';

        const d1 = sortear(db.detalhes);
        let d2 = sortear(db.detalhes); while(d2 === d1) d2 = sortear(db.detalhes);

        document.getElementById('editor').innerHTML = `
            <div style="font-size:14pt; font-weight:bold; text-align:center; margin-bottom:0.8cm;">${esc ? 'ESCOLA: ' + esc : 'ESCOLA: INSTITUIÇÃO NÃO INFORMADA'}</div>
            <div style="line-height:1.5; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:0.8cm; text-transform:uppercase;">
                <b>DOCENTE:</b> ${prof}<br>
                <b>CRIANÇA:</b> <b>${nome}</b><br>
                <b>FASE:</b> ${document.getElementById('fase').value} | <b>TURMA:</b> ${document.getElementById('turma').value.toUpperCase()}
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:0.8cm; text-transform:uppercase;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${pTexto}</div>
            <div class="corpo-texto">${intro}${nome} ${sortear(db.desenvolvimento[dominante])}</div>
            <div class="corpo-texto">${d1} ${d2} Essa postura investigativa foi fundamental para a construção de conceitos práticos e lúdicos em sua rotina diária.</div>
            <div class="corpo-texto" style="margin-bottom:0;">${sortear(db.conclusao)}</div>
            <div style="text-align:center; font-style:italic; margin-top:1cm; margin-bottom:1cm;">"Cada vivência é um registro de amor e aprendizado."</div>
            <div style="text-align:center; margin:0.8cm 0;">${cidade}, ${new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })}.</div>
            
            <div class="bloco-assinatura">
                <div><div class="linha-assinatura"></div><small>PROFESSOR(A)</small></div>
                <div><div class="linha-assinatura"></div><small>COORDENAÇÃO / DIREÇÃO</small></div>
                <div class="assinatura-full"><div class="linha-assinatura"></div><small>ASSINATURA DO RESPONSÁVEL</small></div>
            </div>
        `;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('btn-print').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    const cCont = document.getElementById('campos-container');
    const camposBNCCLocal = [
        {t: "1. O EU, O OUTRO E O NÓS", p: "A criança interage bem com os outros e respeita combinados?"},
        {t: "2. CORPO, GESTOS E MOVIMENTOS", p: "A criança demonstra bom equilíbrio e coordenação motora?"},
        {t: "3. TRAÇOS, SONS, CORES E FORMAS", p: "A criança gosta de artes e reconhece cores e sons?"},
        {t: "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", p: "A criança fala com clareza e entende as histórias lidas?"},
        {t: "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES", p: "A criança identifica números e entende a rotina escolar?"}
    ];

    camposBNCCLocal.forEach((item, i) => {
        cCont.innerHTML += `<div class="secao-pergunta">
                <span class="titulo-campo">${item.t}</span>
                <span class="pergunta-maior">${item.p}</span>
            </div>
            <div class="grid-botoes" id="c-${i}">
                <div class="btn-v ini" onclick="marcar(${i},'ini',this)">INICIAL</div>
                <div class="btn-v pro" onclick="marcar(${i},'pro',this)">PROCESSO</div>
                <div class="btn-v ava" onclick="marcar(${i},'ava',this)">AVANÇADO</div>
            </div>`;
    });
</script>
</body>
</html>
