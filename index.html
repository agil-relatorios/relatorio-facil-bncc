<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaNobre - Gestão Pedagógica</title>
    <style>
        @media print { .no-print { display: none; } body { background: white; } .container { box-shadow: none; border: none; width: 100%; } }
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 700px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: auto; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #2c3e50; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-main { background-color: #27ae60; color: white; grid-column: span 2; font-size: 18px; }
        .btn-copy { background-color: #2980b9; color: white; }
        .btn-save { background-color: #8e44ad; color: white; }
        .btn-print { background-color: #34495e; color: white; grid-column: span 2; }
        #saida { margin-top: 25px; padding: 20px; border: 1px solid #ddd; background: #fff; line-height: 1.6; min-height: 100px; }
        .footer-info { margin-top: 40px; font-size: 12px; color: #7f8c8d; text-align: center; border-top: 1px solid #eee; padding-top: 10px; }
        .data-hora { font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>EducaNobre 🍎</h1>
        <p style="text-align:center; font-size: 14px;">Relatório Individual de Acompanhamento</p>

        <label>Nome do Aluno:</label>
        <input type="text" id="nomeAluno" placeholder="Nome completo da criança">

        <label>Campo de Experiência (BNCC):</label>
        <select id="campo">
            <option value="O eu, o outro e o nós">O eu, o outro e o nós</option>
            <option value="Corpo, gestos e movimentos">Corpo, gestos e movimentos</option>
            <option value="Traços, sons, cores e formas">Traços, sons, cores e formas</option>
            <option value="Escuta, fala, pensamento e imaginação">Escuta, fala, pensamento e imaginação</option>
            <option value="Espaços, tempos, quantidades, relações e transformações">Espaços, tempos, quantidades</option>
        </select>

        <label>Nível de Desenvolvimento:</label>
        <select id="nivel">
            <option value="avancado">Seguro(a) e Autônomo(a)</option>
            <option value="intermediario">Em fase de Descobertas</option>
            <option value="inicial">Iniciando com Apoio</option>
        </select>

        <label>Observações Adicionais (Espaço do Professor):</label>
        <textarea id="obsProfessor" rows="3" placeholder="Escreva aqui detalhes específicos da rotina..."></textarea>

        <button class="btn-main" onclick="gerarRelatorio()">Gerar Relatório Estruturado</button>
    </div>

    <div id="documentoFinal">
        <div id="saida" style="display:none;">
            <span class="data-hora" id="dtExibicao"></span>
            <div id="corpoTexto"></div>
        </div>

        <div class="btn-group no-print" id="acoes" style="display:none;">
            <button class="btn-copy" onclick="copiarTexto()">Copiar para o Sistema</button>
            <button class="btn-save" onclick="baixarArquivo()">Salvar no Dispositivo</button>
            <button class="btn-print" onclick="window.print()">Imprimir / Baixar PDF</button>
        </div>
    </div>

    <div class="footer-info no-print">
        <p><b>Termos de Uso:</b> Este App é uma ferramenta de apoio pedagógico. Os dados digitados não são armazenados em servidores externos, garantindo a privacidade da criança conforme a LGPD. O conteúdo gerado é de responsabilidade do educador.</p>
    </div>
</div>

<script>
    function gerarRelatorio() {
        const nome = document.getElementById('nomeAluno').value || "A criança";
        const campo = document.getElementById('campo').value;
        const nivel = document.getElementById('nivel').value;
        const obs = document.getElementById('obsProfessor').value;
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR') + " às " + agora.toLocaleTimeString('pt-BR');

        const frases = {
            "Corpo, gestos e movimentos": {
                "avancado": `${nome} demonstra muita segurança ao se movimentar, participando com alegria de brincadeiras de correr e pular. Demonstra equilíbrio e consegue coordenar bem seus movimentos ao explorar o espaço escolar.`,
                "intermediario": `${nome} tem se mostrado cada vez mais interessada em atividades que desafiam seu equilíbrio. Está ganhando confiança para realizar grandes movimentos e já participa de circuitos físicos com autonomia.`,
                "inicial": `Estamos acompanhando de perto o desenvolvimento motor de ${nome}. No momento, está descobrindo como se equilibrar e se movimentar com mais firmeza, necessitando de estímulos carinhosos.`
            }
        };

        let baseTexto = frases["Corpo, gestos e movimentos"][nivel]; // Exemplo base
        if (campo !== "Corpo, gestos e movimentos") {
            baseTexto = `${nome} demonstra interesse nas atividades de ${campo}, apresentando um desenvolvimento constante e harmonioso em suas interações.`;
        }

        const textoFinal = `RELATÓRIO PEDAGÓGICO\nALUNO(A): ${nome}\nCAMPO: ${campo}\n\nDESCRITIVO: ${baseTexto}\n\nOBSERVAÇÕES DO PROFESSOR: ${obs}`;

        document.getElementById('dtExibicao').innerText = "Gerado em: " + dataFormatada;
        document.getElementById('corpoTexto').innerText = textoFinal;
        document.getElementById('saida').style.display = 'block';
        document.getElementById('acoes').style.display = 'grid';
    }

    function copiarTexto() {
        const texto = document.getElementById('corpoTexto').innerText;
        navigator.clipboard.writeText(texto).then(() => alert("Copiado!"));
    }

    function baixarArquivo() {
        const nome = document.getElementById('nomeAluno').value || "relatorio";
        const texto = document.getElementById('corpoTexto').innerText;
        const blob = new Blob([texto], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Relatorio_${nome}.txt`;
        link.click();
    }
</script>
</body>
</html>
