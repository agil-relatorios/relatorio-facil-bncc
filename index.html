<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - ABNT Final</title>
    <style>
        :root { --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .campo-input { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        input, select { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; text-transform: uppercase; }
        .secao-pergunta { background: var(--azul); color: white; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn-v { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; background: white; font-size: 0.7rem; }
        .btn-v.active { color: white; border-color: transparent; }
        .btn-v.ini.active { background: #e74c3c; }
        .btn-v.pro.active { background: #f1c40f; }
        .btn-v.ava.active { background: #2ecc71; }
        .btn-gerar { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; background: var(--primaria); }

        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            #editor { 
                display: block !important; 
                width: 210mm; height: 297mm;
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box;
                font-family: Arial, sans-serif !important;
                color: #000 !important;
            }
        }

        #editor { 
            width: 210mm; margin: 20px auto; background: white; display: none; 
            padding: 3cm 2cm 2cm 3cm; box-sizing: border-box; border: 1px dashed #ccc;
            font-family: Arial, sans-serif;
        }
        .corpo-texto { 
            font-size: 12pt !important; 
            line-height: 1.5 !important; 
            text-align: justify !important; 
            text-indent: 1.25cm;
            margin-top: 2cm; /* Espaço de 2.0 entre título e texto */
        }
    </style>
</head>
<body>
    <header class="no-print"><h1 style="margin:0">CONTAÊ PROFE</h1></header>

    <div class="container no-print">
        <div class="grid-inputs">
            <div class="campo-input"><label>Escola</label><input type="text" id="escola"></div>
            <div class="campo-input"><label>Professor</label><input type="text" id="prof"></div>
            <div class="campo-input"><label>Criança</label><input type="text" id="crianca"></div>
            <div class="campo-input"><label>Turma</label><input type="text" id="turma"></div>
            <div class="campo-input"><label>Fase</label><select id="fase"><option>1º PERÍODO</option><option>2º PERÍODO</option></select></div>
            <div class="campo-input"><label>Gênero</label><select id="genero"><option value="o aluno">O ALUNO</option><option value="a aluna">A ALUNA</option></select></div>
            <div class="campo-input"><label>Período</label><select id="periodo">
                <option>1º BIMESTRE</option><option>2º BIMESTRE</option><option>3º BIMESTRE</option><option>4º BIMESTRE</option>
                <option>1º SEMESTRE</option><option>2º SEMESTRE</option>
            </select></div>
        </div>
        <div id="campos-container"></div>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO ABNT</button>
    </div>

    <div id="editor" contenteditable="true"></div>

    <div class="no-print" id="btn-print" style="display:none; text-align:center; padding: 20px;">
        <button onclick="window.print()" style="padding:15px 50px; background:var(--azul); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR EM 1 FOLHA</button>
    </div>

    <script>
        const campos = ["1. O EU, O OUTRO E O NÓS", "2. CORPO, GESTOS E MOVIMENTOS", "3. TRAÇOS, SONS, CORES E FORMAS", "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES"];
        const frasesProf = [
            "Seu brilho único ilumina nossa sala todos os dias.",
            "Cada pequena conquista sua é motivo de grande alegria para nós.",
            "Sua curiosidade e alegria transformam nosso aprendizado em aventura.",
            "É um privilégio acompanhar seu crescimento e descobertas."
        ];

        const cCont = document.getElementById('campos-container');
        campos.forEach((n, i) => {
            cCont.innerHTML += `<div class="secao-pergunta">${n}</div><div class="grid-botoes" id="c-${i}">
                <div class="btn-v ini" onclick="marcar(${i},'ini',this)">INICIAL</div>
                <div class="btn-v pro" onclick="marcar(${i},'pro',this)">PROCESSO</div>
                <div class="btn-v ava" onclick="marcar(${i},'ava',this)">AVANÇADO</div>
            </div>`;
        });

        function marcar(idx, tipo, btn) {
            Array.from(document.getElementById(`c-${idx}`).children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function gerarRelatorio() {
            const esc = document.getElementById('escola').value.toUpperCase();
            const prof = document.getElementById('prof').value.toUpperCase();
            const nome = document.getElementById('crianca').value.toUpperCase();
            const turma = document.getElementById('turma').value.toUpperCase();
            const fase = document.getElementById('fase').value;
            const gen = document.getElementById('genero').value;
            const per = document.getElementById('periodo').value;
            const fraseAleatoria = frasesProf[Math.floor(Math.random() * frasesProf.length)];

            document.getElementById('editor').innerHTML = `
                <div style="text-align:center; font-weight:bold; font-size:14pt; margin-bottom:2cm;">ESCOLA: ${esc || '__________________'}</div>
                
                <div style="font-size:12pt; line-height:1.5; margin-bottom:3cm;">
                    <b>PROFESSOR(A):</b> ${prof}<br>
                    <b>CRIANÇA:</b> ${nome}<br>
                    <b>TURMA:</b> ${turma} &nbsp;&nbsp;&nbsp; <b>FASE:</b> ${fase}
                </div>

                <div style="text-align:center; font-weight:bold; font-size:12pt;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL - ${per}</div>
                
                <div class="corpo-texto">
                    Mediante a estruturação de ambientes que provocam o protagonismo e a curiosidade natural da infância, oportunizou-se ao longo deste processo pedagógico que ${gen} <strong>${nome}</strong> ampliasse sua percepção espacial e temporal através de jogos e vivências lúdicas. Demonstrou segurança ao enfrentar desafios motores e uma curiosidade científica ao investigar fenômenos ao seu redor.
                    <br><br>
                    Além disso, demonstrou autonomia ao realizar suas atividades de rotina, revelando cuidado consigo e com o próximo. Sua relação com a oralidade foi ampliada significativamente através da participação em momentos de contação de histórias, onde associou a ficção com suas próprias vivências de forma criativa.
                </div>
                
                <p style="text-align:center; margin-top:3cm; font-style:italic; font-size:12pt;">"${fraseAleatoria}"</p>
                <p style="text-align:center; margin-top:2cm; font-size:12pt;">Manaus, 19 de abril de 2026.</p>
                
                <div style="margin-top:3cm; text-align:center; font-size:11pt;">
                    <div style="margin-bottom:2.5cm;"><b><div style="border-top:1px solid #000; width:300px; margin:auto;"></div>PROFESSOR(A)</b></div>
                    <div style="margin-bottom:2.5cm;"><b><div style="border-top:1px solid #000; width:300px; margin:auto;"></div>COORDENAÇÃO / DIREÇÃO</b></div>
                    <div><b><div style="border-top:1px solid #000; width:300px; margin:auto;"></div>RESPONSÁVEL</b></div>
                </div>
            `;
            document.getElementById('editor').style.display = 'block';
            document.getElementById('btn-print').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
