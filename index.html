<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAÊ PROFE - SISTEMA PEDAGÓGICO</title>
    <style>
        :root { 
            --primaria: #ff4757; --azul-ui: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; 
            --branco: #ffffff; --cor-vermelho: #e74c3c; --cor-amarelo: #f1c40f; --cor-azul: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 0; }
        header { background: var(--primaria); color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .campo { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; color: #57606f; }
        input, select { padding: 10px; border: 2px solid #edeff2; border-radius: 8px; font-size: 0.9rem; }
        .upcase { text-transform: uppercase; }

        .secao-pergunta { background: #2f3542; color: white; padding: 10px; border-radius: 6px; margin: 20px 0 8px; }
        .pergunta-maior { display: block; font-size: 1rem; font-weight: 600; }
        
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-v { padding: 12px; border: 2px solid #edeff2; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; font-size: 0.7rem; background: white; transition: 0.3s; }
        .btn-v.ini.active { background: var(--cor-vermelho); color: white; border-color: var(--cor-vermelho); }
        .btn-v.pro.active { background: var(--cor-amarelo); color: white; border-color: var(--cor-amarelo); }
        .btn-v.ava.active { background: var(--cor-azul); color: white; border-color: var(--cor-azul); }

        .acoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-gerar { padding: 18px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; color: white; background: var(--primaria); cursor: pointer; }
        .btn-limpar { padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; background: white; }

        #editor { 
            width: 210mm; min-height: 297mm; margin: 20px auto; background: white; 
            padding: 20mm; box-sizing: border-box; font-family: Arial, sans-serif; 
            font-size: 12pt; color: #000000; display: none; line-height: 1.5;
        }
        .corpo-texto { text-align: justify; text-indent: 1.25cm; margin-bottom: 0.8em; color: #000000; }
        
        .bloco-assinaturas { margin-top: 1.5cm; display: flex; flex-direction: column; align-items: center; }
        .assinaturas-superior { display: flex; justify-content: space-between; width: 100%; margin-bottom: 1.2cm; }
        .box-sig { border-top: 1px solid #000; width: 45%; text-align: center; padding-top: 5px; font-size: 10pt; font-weight: bold; color: #000000; }
        .box-sig-full { border-top: 1px solid #000; width: 60%; text-align: center; padding-top: 5px; font-size: 10pt; font-weight: bold; color: #000000; }

        @media print { 
            body { background: white; color: #000000; }
            .no-print { display: none !important; }
            #editor { display: block !important; margin: 0; border: none; width: 100%; color: #000000; }
            * { color: #000000 !important; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <h1 style="margin:0">CONTAÊ PROFE</h1>
    <small>Excelência Pedagógica e Jurídica</small>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade" placeholder="Ex: Rio de Janeiro"></div>
        <div class="campo"><label>Nome da Escola</label><input type="text" id="escola" class="upcase" placeholder="NOME DA INSTITUIÇÃO"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof" class="upcase"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca" class="upcase"></div>
        <div class="campo"><label>Gênero</label>
            <select id="genero"><option>A CRIANÇA</option><option>O ALUNO</option><option>A ALUNA</option></select>
        </div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option value="1B">1º BIMESTRE</option><option value="2B">2º BIMESTRE</option>
                <option value="3B">3º BIMESTRE</option><option value="4B">4º BIMESTRE</option>
                <option value="1S">1º SEMESTRE</option><option value="2S">2º SEMESTRE</option>
            </select>
        </div>
    </div>

    <div id="campos-bncc"></div>

    <div class="acoes">
        <button class="btn-limpar" onclick="location.reload()">NOVO RELATÓRIO</button>
        <button class="btn-gerar" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO</button>
    </div>
</div>

<div id="editor"></div>
<div class="no-print" style="text-align:center; padding: 20px; display:none" id="print-area">
    <button onclick="window.print()" style="padding:15px 40px; background:#2f3542; color:white; border-radius:8px; cursor:pointer; font-weight:bold">🖨️ IMPRIMIR RELATÓRIO</button>
</div>

<script>
    const camposBNCC = [
        "1. O EU, O OUTRO E O NÓS",
        "2. CORPO, GESTOS E MOVIMENTOS",
        "3. TRAÇOS, SONS, CORES E FORMAS",
        "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO",
        "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES"
    ];

    let escolhas = {};

    function montarInterface() {
        const container = document.getElementById('campos-bncc');
        camposBNCC.forEach((c, i) => {
            container.innerHTML += `
                <div class="secao-pergunta"><span class="pergunta-maior">${c}</span></div>
                <div class="grid-botoes" id="c-${i}">
                    <div class="btn-v ini" onclick="setCor(${i}, 'vermelho', this)">COM MEDIAÇÃO</div>
                    <div class="btn-v pro" onclick="setCor(${i}, 'amarelo', this)">EM PROCESSO</div>
                    <div class="btn-v ava" onclick="setCor(${i}, 'azul', this)">COM AUTONOMIA</div>
                </div>`;
        });
    }

    function setCor(idx, cor, btn) {
        Array.from(document.getElementById(`c-${idx}`).children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        escolhas[idx] = cor;
    }

    // Função de correção de cidade com tratamento de preposições
    function formatarCidade(str) {
        const preposicoes = ["de", "da", "do", "dos", "das", "e", "em"];
        return str.toLowerCase().split(' ').map((palavra, index) => {
            if (index > 0 && preposicoes.includes(palavra)) return palavra;
            return palavra.charAt(0).toUpperCase() + palavra.slice(1);
        }).join(' ');
    }

    function sortear(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const db = {
        vermelho: {
            intro: [
                "Neste período, a intencionalidade pedagógica concentrou-se na organização de uma rotina de acolhimento e cuidado intenso, visando oferecer o suporte emocional e a segurança necessária para a criança. Notou-se que ",
                "Pautamos nossa ação educativa na mediação direta em contextos de grande grupo e atividades dirigidas, priorizando o olhar sensível sobre as carências afetivas e de rotina. Percebeu-se que "
            ],
            corpo: [
                "ainda necessita de mediação constante para organizar-se nos momentos de higiene e alimentação, apresentando resistência em seguir os combinados coletivos. Requer atenção individualizada na roda de conversa e momentos de área externa, evidenciando que a construção de limites e autonomia está em fase inicial de sensibilização. ",
                "demonstra forte dependência do suporte do professor para interagir com os pares e participar de atividades livres. Requer um olhar afetuoso e firme para auxiliar na regulação de suas emoções diante de frustrações, demandando mediação sistemática para internalizar a sequência da rotina escolar. ",
                "necessita de intervenção direta para realizar as propostas pedagógicas, mostrando-se em um processo de adaptação que exige paciência e reforço constante dos laços afetivos. A mediação docente é fundamental para encorajá-lo(a) a explorar novos ambientes e aceitar os desafios propostos. "
            ]
        },
        amarelo: {
            intro: [
                "Ao longo deste ciclo, estruturamos contextos que provocam o protagonismo gradual, respeitando a trajetória individual e o tempo de maturação. Observou-se que ",
                "As propostas pedagógicas foram delineadas para fortalecer a autoconfiança em pequenos grupos e momentos de vivência coletiva. Notou-se que "
            ],
            corpo: [
                "encontra-se em uma fase de transição importante, começando a realizar as atividades de cuidado com menos intervenção direta da professora. Embora busque a validação constante para suas ações, demonstra tentativas admiráveis de resolver pequenos conflitos e seguir a rotina com segurança. ",
                "revelou-se mais participativo(a) nas festividades e momentos de área externa, ensaiando passos significativos de autonomia. Consegue seguir os combinados do grupo com mediações pontuais, revelando que os marcos de desenvolvimento estão sendo processados de forma consistente. "
            ]
        },
        azul: {
            intro: [
                "Pautamos nossa prática na oferta de territórios de aprendizagem desafiadores, instigando o desejo de conhecer e a resolução colaborativa. Percebeu-se que ",
                "Neste estágio, os direitos de conviver, brincar e participar foram exercidos com pleno protagonismo, garantindo excelência no percurso. Notou-se que "
            ],
            corpo: [
                "manifesta total autonomia e segurança ao circular pelos diferentes espaços da escola. Interage com os pares de forma empática e lidera iniciativas em pequenos grupos, demonstrando domínio das normas de convívio e um protagonismo admirável em todas as produções. ",
                "apresenta uma postura investigativa e independente, realizando as atividades de higiene e alimentação com excelência. Sua oralidade é clara e estruturada, permitindo mediar conflitos e expressar sentimentos com segurança e autonomia plena. "
            ]
        }
    };

    function gerarRelatorio() {
        const nome = document.getElementById('crianca').value.toUpperCase() || "A CRIANÇA";
        const prof = document.getElementById('prof').value.toUpperCase() || "NÃO INFORMADO";
        const esc = document.getElementById('escola').value.toUpperCase() || "NÃO INFORMADO";
        const cidadeInput = document.getElementById('cidade').value || "Manaus";
        const cidadeFormatada = formatarCidade(cidadeInput);
        const data = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

        const vals = Object.values(escolhas);
        const freq = vals.reduce((acc, v) => { acc[v] = (acc[v] || 0) + 1; return acc; }, {});
        let dom = "amarelo"; 
        if (freq.vermelho >= 3) dom = "vermelho";
        else if (freq.azul >= 3) dom = "azul";

        const intro = sortear(db[dom].intro);
        const corpo = sortear(db[dom].corpo);

        document.getElementById('editor').innerHTML = `
            <div style="text-align:center; font-weight:bold; margin-bottom:0.5cm; color:#000;">${cidadeFormatada} - ESCOLA: ${esc}</div>
            <div style="border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 0.8cm; text-transform:uppercase; font-size:11pt; color:#000;">
                <b>DOCENTE:</b> ${prof}<br>
                <b>CRIANÇA:</b> <b>${nome}</b><br>
                <b>PERÍODO:</b> ${document.querySelector('#periodo option:checked').text}
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:0.8cm; color:#000;">RELATÓRIO DE DESENVOLVIMENTO INTEGRAL</div>
            <div class="corpo-texto">${intro}${nome} ${corpo}</div>
            <div class="corpo-texto">No que tange aos campos de experiências e direitos de aprendizagem, observamos que o processo ocorre de forma gradual, sendo mediado por estratégias que visam o acolhimento e a construção de novos marcos de conhecimento.</div>
            <div class="corpo-texto">Concluímos este registro reafirmando o compromisso com uma educação de excelência, onde o olhar atento do professor atua como ponte para a conquista de novas habilidades e o florescimento da subjetividade do estudante.</div>
            <div style="text-align:center; font-style:italic; margin: 1cm 0; font-size:11pt; color:#000;">"Sua curiosidade é a semente do futuro."</div>
            <div style="text-align:center; margin-bottom:1.5cm; color:#000;">${cidadeFormatada}, ${data}.</div>
            
            <div class="bloco-assinaturas">
                <div class="assinaturas-superior">
                    <div class="box-sig">PROFESSOR(A)</div>
                    <div class="box-sig">COORDENAÇÃO / DIREÇÃO</div>
                </div>
                <div class="box-sig-full">ASSINATURA DO RESPONSÁVEL</div>
            </div>
        `;

        document.getElementById('editor').style.display = 'block';
        document.getElementById('print-area').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    montarInterface();
</script>
</body>
</html>
