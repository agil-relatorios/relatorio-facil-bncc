<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CONTAÊ PROFE - SISTEMA PROFISSIONAL</title>
    <style>
        :root { --p: #ff4757; --s: #2ed573; --t: #1e90ff; --txt: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f2f6; color: var(--txt); padding: 20px; text-transform: uppercase; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Instruções */
        .instrucao { font-size: 0.75rem; color: #747d8c; font-style: italic; margin-bottom: 10px; display: block; }
        
        /* Grid Cadastro */
        .grid-cad { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .campo { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; color: #57606f; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.85rem; text-transform: uppercase; }

        /* Botões */
        .secao-titulo { background: #2f3542; color: white; padding: 10px; border-radius: 5px; margin-top: 25px; font-size: 0.85rem; text-align: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 10px; }
        .btn { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .btn.active { background: var(--t); color: white; border-color: var(--t); }

        /* Estilo ABNT Impressão */
        #resultado { display: none; margin-top: 40px; }
        #folha-a4 { 
            width: 210mm; min-height: 297mm; padding: 30mm 20mm 20mm 30mm; /* Margens ABNT */
            margin: auto; background: white; border: 1px solid #000;
            font-family: Arial, sans-serif; font-size: 12pt; color: black;
            line-height: 1.5; text-align: justify; box-sizing: border-box;
        }
        .btn-acao { width: 100%; padding: 20px; background: var(--p); color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        @media print { .no-print { display: none !important; } #folha-a4 { border: none; padding: 0; margin: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="secao-titulo">CADASTRO INSTITUCIONAL</div>
    <div class="grid-cad">
        <div class="campo"><label>Escola</label><input type="text" id="esc" placeholder="E.M. ARTHUR CÉZAR FERREIRA REIS"></div>
        <div class="campo"><label>Endereço</label><input type="text" id="end" placeholder="RUA, Nº, BAIRRO"></div>
        <div class="campo"><label>Telefone / E-mail</label><input type="text" id="cont" placeholder="(92) 0000-0000"></div>
        <div class="campo"><label>Professora</label><input type="text" id="prof"></div>
        <div class="campo"><label>Criança</label><input type="text" id="nome"></div>
        <div class="campo"><label>Matrícula</label><input type="text" id="mat"></div>
        <div class="campo"><label>Fase/Turma/Turno</label><input type="text" id="ftt" placeholder="2º PERÍODO - TURMA N - INTEGRAL"></div>
    </div>

    <div class="secao-titulo">ITINERÁRIOS DE VIVÊNCIAS E PROJETOS</div>
    <span class="instrucao">(Marque de 3 a 5 opções em que a criança se destacou ou participou com maior interesse)</span>
    <div class="grid-btns" id="v-btns"></div>

    <div class="secao-titulo">DIMENSÕES DO CONVIVER E EXPRESSAR</div>
    <div class="grid-btns" id="p-btns"></div>

    <button class="btn-acao" onclick="gerarRelatorio()">📝 GERAR RELATÓRIO ABNT</button>
</div>

<div id="resultado">
    <div id="folha-a4" contenteditable="true"></div>
    <div class="no-print" style="text-align: center; margin: 20px;">
        <button onclick="window.print()" style="padding: 15px 40px; background: #2ed573; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">💾 SALVAR / IMPRIMIR PDF</button>
    </div>
</div>

<script>
    const db = {
        vivencias: ['Rodas de Conversa', 'Projetos de Leitura', 'Contação de Histórias', 'Atividades Lúdicas', 'Horta Escolar', 'Artes Visuais', 'Culinária Pedagógica', 'Jogos Cooperativos', 'Faz de Conta'],
        perfil: ['Resistente', 'Participativa', 'Cooperativa', 'Líder', 'Lenta', 'Ativa', 'Persistente', 'Habilidosa', 'Dominante', 'Atenta', 'Curiosa'],
        
        // Dicionário de humanização para gerar milhares de combinações
        frases: {
            'RESISTENTE': ["demonstra certa reticência frente a novos desafios", "apresenta momentos de resistência em transições de rotina", "requer suporte afetivo para lidar com frustrações"],
            'PARTICIPATIVA': ["envolve-se com entusiasmo nas propostas coletivas", "demonstra engajamento e prontidão nas atividades", "colabora de forma ativa nas vivências propostas"],
            'LÍDER': ["assume postura de protagonismo perante o grupo", "demonstra liderança positiva em brincadeiras de faz de conta", "conduz as interações lúdicas com autonomia e segurança"]
        }
    };

    let selV = [], selP = [];

    function render() {
        db.vivencias.forEach(v => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = v;
            b.onclick = () => { b.classList.toggle('active'); toggle(selV, v); };
            document.getElementById('v-btns').appendChild(b);
        });
        db.perfil.forEach(p => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = p;
            b.onclick = () => { b.classList.toggle('active'); toggle(selP, p); };
            document.getElementById('p-btns').appendChild(b);
        });
    }

    function toggle(a, i) { let idx = a.indexOf(i); if(idx > -1) a.splice(idx, 1); else a.push(i); }

    function gerarRelatorio() {
        const d = {
            esc: document.getElementById('esc').value.toUpperCase(),
            end: document.getElementById('end').value.toUpperCase(),
            cont: document.getElementById('cont').value.toUpperCase(),
            prof: document.getElementById('prof').value.toUpperCase(),
            nome: document.getElementById('nome').value.toUpperCase(),
            mat: document.getElementById('mat').value.toUpperCase(),
            ftt: document.getElementById('ftt').value.toUpperCase()
        };

        const data = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();

        // Lógica de construção do texto com conectores BNCC
        let textoV = selV.length > 0 ? ` FOI POSSÍVEL OBSERVAR SEU INTERESSE EM VIVÊNCIAS DE ${selV.join(', ')}.` : "";
        let textoP = selP.map(p => db.frases[p] ? db.frases[p][Math.floor(Math.random() * db.frases[p].length)] : p).join('. ALÉM DISSO, ');

        const layout = `
            <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px;">
                <strong>${d.esc}</strong><br>${d.end}<br>${d.cont}
            </div>
            <div style="margin-bottom: 20px;">
                <strong>PROFESSOR(A):</strong> ${d.prof}<br>
                <strong>CRIANÇA:</strong> ${d.nome}<br>
                <strong>FASE:</strong> ${d.ftt} <strong style="margin-left: 30px;">MATRÍCULA:</strong> ${d.mat}
            </div>
            <p style="font-size: 10pt; font-style: italic; border: 1px solid #ddd; padding: 10px;">
                DECLARAMOS QUE A ALUNA <strong>${d.nome}</strong> ENCONTRA-SE DEVIDAMENTE MATRICULADA E FREQUENTE NESTA INSTITUIÇÃO DE ENSINO.
            </p>
            <center><strong>RELATÓRIO DO DESENVOLVIMENTO INTEGRAL</strong></center><br>
            <p style="text-indent: 1.5cm;">NO 1º SEMESTRE, O PERCURSO DE <strong>${d.nome}</strong> NA INSTITUIÇÃO <strong>${d.esc}</strong> FOI PAUTADO PELA GARANTIA DOS DIREITOS DE APRENDIZAGEM E DESENVOLVIMENTO[cite: 10]. ${textoV}</p>
            <p style="text-indent: 1.5cm;">DENTRO DO CAMPO DO CONVIVER E EXPRESSAR, A DISCENTE ${textoP.toUpperCase()}. REVELA UM PERFIL ATENTO E PARTICIPATIVO, ABSORVENDO NOVOS CONHECIMENTOS COM FACILIDADE[cite: 15].</p>
            <p style="text-indent: 1.5cm;">CONCLUÍMOS QUE SEGUE EM PLENO DESENVOLVIMENTO PEDAGÓGICO, INTEGRANDO-SE COM HARMONIA AO COLETIVO[cite: 8, 15].</p>
            <br><br>
            <div style="text-align: right;">MANAUS, ${data}</div>
            <br><br>
            <div style="display: flex; justify-content: space-around; text-align: center; font-size: 10pt;">
                <div>__________________________<br>PROFESSOR(A)</div>
                <div>__________________________<br>DIREÇÃO/PEDAGOGO(A)</div>
            </div>
        `;

        document.getElementById('folha-a4').innerHTML = layout;
        document.getElementById('resultado').style.display = 'block';
        window.scrollTo(0, document.getElementById('resultado').offsetTop);
    }

    render();
</script>
</body>
</html>
