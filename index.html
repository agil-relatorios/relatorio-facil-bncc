<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CONTAÊ PROFE - Versão Estabilizada</title>
    <style>
        :root { 
            --primaria: #ff4757; --azul: #1e90ff; --bg: #f8f9fa; --texto: #2f3542; --branco: #ffffff;
            --cor-inicial: #e74c3c; --cor-processo: #f1c40f; --cor-avancado: #2ecc71; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--texto); }
        header { background: var(--primaria); color: white; padding: 25px 15px; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .logo span { color: #ffeaa7; }

        .container { max-width: 900px; width: 95%; margin: 15px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 0.65rem; text-transform: uppercase; color: #57606f; margin-bottom: 6px; display: block; }
        
        input, select { 
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; width: 100%; box-sizing: border-box; background-color: #fcfcfc;
        }

        .secao-pergunta { background: var(--azul); color: white; padding: 10px; border-radius: 10px; margin: 25px 0 10px; }
        .pergunta-texto { font-size: 0.75rem; font-weight: bold; margin: 0; text-transform: uppercase; }

        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-v { padding: 12px 2px; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-size: 0.6rem; font-weight: bold; text-align: center; background: white; color: #747d8c; }
        .btn-v.active { color: white; }
        .btn-v.ini.active { background: var(--cor-inicial); }
        .btn-v.pro.active { background: var(--cor-processo); }
        .btn-v.ava.active { background: var(--cor-avancado); }

        .btn-acao { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gerar { background: var(--primaria); color: white; }
        .btn-novo { background: #747d8c; color: white; }

        #editor { display: none; padding: 20mm; background: white; margin-top: 20px; border: 1px solid #eee; }
        
        @media print { .no-print { display: none; } #editor { display: block; } }
    </style>
</head>
<body>

<header class="no-print">
    <h1 class="logo">CONTAÊ <span>PROFE</span></h1>
</header>

<div class="container no-print">
    <div class="grid-inputs">
        <div class="campo"><label>Cidade</label><input type="text" id="cidade"></div>
        <div class="campo"><label>Escola</label><input type="text" id="escola"></div>
        <div class="campo"><label>Professor(a)</label><input type="text" id="prof"></div>
        <div class="campo"><label>Criança</label><input type="text" id="crianca"></div>
        <div class="campo"><label>Gênero</label>
            <select id="genero">
                <option value="" selected></option>
                <option value="o">O ALUNO</option>
                <option value="a">A ALUNA</option>
            </select>
        </div>
        <div class="campo"><label>Fase</label>
            <select id="fase">
                <option value="" selected></option>
                <option value="1º PERÍODO">1º PERÍODO</option>
                <option value="2º PERÍODO">2º PERÍODO</option>
                <option value="MATERNAL">MATERNAL</option>
            </select>
        </div>
        <div class="campo"><label>Turma</label><input type="text" id="turma"></div>
        <div class="campo"><label>Período</label>
            <select id="periodo">
                <option value="" selected></option>
                <option value="1º BIMESTRE">1º BIMESTRE</option>
                <option value="2º BIMESTRE">2º BIMESTRE</option>
            </select>
        </div>
    </div>

    <div id="campos-bncc"></div>

    <button onclick="gerarRelatorioFinal()" class="btn-acao btn-gerar no-print">📝 GERAR RELATÓRIO</button>
    <button onclick="window.location.reload()" class="btn-acao btn-novo no-print">👤 NOVO ALUNO / LIMPAR</button>
</div>

<div id="editor"></div>

<script>
    const dbRelatorios = [
        { t: "1. O EU, O OUTRO E O NÓS", frases: { ini: ["frase 1"], pro: ["frase 2"], ava: ["frase 3"] }, conectivos: ["Conectivo "] },
        { t: "2. CORPO, GESTOS E MOVIMENTOS", frases: { ini: ["frase 1"], pro: ["frase 2"], ava: ["frase 3"] }, conectivos: ["Conectivo "] },
        { t: "3. TRAÇOS, SONS, CORES E FORMAS", frases: { ini: ["frase 1"], pro: ["frase 2"], ava: ["frase 3"] }, conectivos: ["Conectivo "] },
        { t: "4. ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO", frases: { ini: ["frase 1"], pro: ["frase 2"], ava: ["frase 3"] }, conectivos: ["Conectivo "] },
        { t: "5. ESPAÇO, TEMPO, QUANTIDADES E RELAÇÕES", frases: { ini: ["frase 1"], pro: ["frase 2"], ava: ["frase 3"] }, conectivos: ["Conectivo "] }
    ];

    function iniciar() {
        const cont = document.getElementById('campos-bncc');
        dbRelatorios.forEach((item, i) => {
            cont.innerHTML += `
                <div class="secao-pergunta"><p class="pergunta-texto">${item.t}</p></div>
                <div class="grid-botoes" id="g-${i}">
                    <div class="btn-v ini" onclick="marcar(${i}, 'ini')">MEDIAÇÃO</div>
                    <div class="btn-v pro" onclick="marcar(${i}, 'pro')">PROCESSO</div>
                    <div class="btn-v ava" onclick="marcar(${i}, 'ava')">AUTONOMIA</div>
                </div>`;
        });
    }

    function marcar(gi, niv) { 
        const btns = document.getElementById(`g-${gi}`).querySelectorAll('.btn-v'); 
        btns.forEach(b => b.classList.remove('active')); 
        document.querySelector(`#g-${gi} .${niv}`).classList.add('active'); 
    }

    function gerarRelatorioFinal() {
        const crianca = document.getElementById('crianca').value;
        const textoBNCC = "Relatório gerado para " + crianca; 
        document.getElementById('editor').innerHTML = `<h2>Relatório</h2><p>${textoBNCC}</p>`;
        document.getElementById('editor').style.display = 'block';
        window.print();
    }

    iniciar();
</script>
</body>
</html>
